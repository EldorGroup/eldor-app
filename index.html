<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELDOR GROUP | Wealth Vault</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@200;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>
    
    <style>
        :root { 
            --gold: #c5a059; 
            --bg: #050505;
            --card: #0d0d0d;
            --border: rgba(197, 160, 89, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        ::-webkit-scrollbar { display: none; }
        
        body, html { 
            background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; 
            height: 100dvh; overflow: hidden; position: fixed; width: 100%;
        }

        #particles-js { position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.3; }

        /* HEADER - מהודק ויוקרתי */
        header {
            position: fixed; top: 0; width: 100%; height: 70px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 5000; padding: 0 4%; background: rgba(0,0,0,0.8);
            border-bottom: 1px solid var(--border);
        }
        .logo { font-family: 'Cinzel', serif; font-size: 20px; letter-spacing: 5px; color: #fff; text-decoration: none; }
        .logo span { color: var(--gold); }

        /* ניווט צד - מינימליסטי */
        nav.side-nav {
            position: fixed; left: 0; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 10px; z-index: 6000;
        }
        .nav-btn {
            background: var(--card); border: 1px solid var(--border);
            height: 50px; width: 50px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; border-radius: 0 4px 4px 0;
        }
        .nav-btn i { color: var(--gold); font-size: 18px; }
        .nav-btn:hover { background: var(--gold); }
        .nav-btn:hover i { color: #000; }

        /* CONTENT AREA */
        .view { 
            position: absolute; inset: 0; padding: 100px 5% 60px; 
            display: none; z-index: 100; justify-content: center; align-items: center;
        }
        .view.active { display: flex; flex-direction: column; animation: fadeIn 0.4s ease; }

        /* האזור האישי - העיצוב החדש והיוקרתי */
        .vault-card { 
            width: 100%; max-width: 380px; background: #0a0a0a;
            padding: 40px; border: 1px solid var(--border);
            text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border-top: 3px solid var(--gold);
        }
        .vault-card h2 { font-family: 'Cinzel'; font-size: 18px; margin-bottom: 30px; letter-spacing: 4px; }
        
        .field { margin-bottom: 20px; text-align: right; }
        .field label { font-size: 10px; color: var(--gold); text-transform: uppercase; letter-spacing: 2px; }
        .field input { 
            width: 100%; padding: 12px 0; background: transparent; 
            border: none; border-bottom: 1px solid #333; color: #fff; 
            font-size: 16px; transition: 0.3s;
        }
        .field input:focus { border-bottom-color: var(--gold); outline: none; }

        .btn-action {
            background: var(--gold); color: #000; border: none; width: 100%;
            padding: 15px; font-weight: 800; font-size: 12px; letter-spacing: 2px;
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .btn-action:hover { filter: brightness(1.2); }

        /* דשבורד - מהודק */
        .dash-wrap { 
            width: 100%; max-width: 1100px; 
            display: grid; grid-template-columns: 1fr 300px; gap: 20px; 
        }
        .stat-panel { background: var(--card); border: 1px solid var(--border); padding: 30px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        .mini-card { background: #000; border: 1px solid #1a1a1a; padding: 20px; text-align: center; }
        .mini-card label { font-size: 9px; color: var(--gold); display: block; margin-bottom: 10px; }
        .mini-card div { font-size: 20px; font-weight: 200; }

        /* TICKER */
        .ticker {
            position: fixed; bottom: 0; width: 100%; height: 35px;
            background: #000; border-top: 1px solid #111;
            z-index: 9000; display: flex; align-items: center; overflow: hidden;
        }
        .ticker-inner { display: flex; white-space: nowrap; animation: slide 30s linear infinite; }
        .ticker-item { padding: 0 25px; font-size: 11px; }
        .ticker-item b { color: var(--gold); }
        @keyframes slide { from { transform: translateX(0); } to { transform: translateX(100%); } }

        /* MOBILE */
        @media (max-width: 800px) {
            .dash-wrap { grid-template-columns: 1fr; }
            .grid-3 { grid-template-columns: 1fr; }
            header { height: 60px; }
            .view { padding-top: 80px; }
        }
    </style>
</head>
<body>

<div id="particles-js"></div>

<header>
    <a href="#" class="logo" onclick="show('home')">ELDOR<span>GROUP</span></a>
    <div style="font-size: 10px; color: var(--gold); letter-spacing: 2px;">WEALTH MANAGEMENT</div>
</header>

<nav class="side-nav">
    <div class="nav-btn" onclick="show('vault')"><i class="fa-solid fa-lock"></i></div>
    <div class="nav-btn" onclick="show('home')"><i class="fa-solid fa-house"></i></div>
    <div class="nav-btn" onclick="show('contact')"><i class="fa-solid fa-phone"></i></div>
</nav>

<div id="home-page" class="view active">
    <h1 style="font-family:'Cinzel'; font-size: clamp(30px, 8vw, 80px); letter-spacing: 15px;">ELDOR</h1>
    <p style="color: var(--gold); letter-spacing: 8px; font-size: 12px; margin-top: 10px;">THE FUTURE OF CAPITAL</p>
</div>

<div id="vault-page" class="view">
    <div id="login-form" class="vault-card">
        <h2>CLIENT ACCESS</h2>
        <div class="field">
            <label>Phone Number</label>
            <input type="tel" id="u_tel">
        </div>
        <div class="field">
            <label>Access Code</label>
            <input type="password" id="u_pass">
        </div>
        <button class="btn-action" onclick="login()">ENTER THE VAULT</button>
    </div>

    <div id="dashboard" class="dash-wrap" style="display: none;">
        <div class="stat-panel">
            <h3 style="font-family:'Cinzel'; font-size: 14px; color: var(--gold); margin-bottom: 20px;">PORTFOLIO PERFORMANCE</h3>
            <div class="grid-3">
                <div class="mini-card"><label>TOTAL VALUE</label><div>₪1,450,230</div></div>
                <div class="mini-card"><label>YTD RETURN</label><div style="color: #00ffaa;">+12.4%</div></div>
                <div class="mini-card"><label>RISK LEVEL</label><div>MODERATE</div></div>
            </div>
            <div style="margin-top: 30px; height: 150px; border-bottom: 1px solid var(--gold);">
                <svg viewBox="0 0 1000 150" preserveAspectRatio="none" style="width: 100%; height: 100%;">
                    <path d="M0,130 Q150,110 300,120 T600,60 T1000,20" fill="none" stroke="var(--gold)" stroke-width="2"/>
                </svg>
            </div>
        </div>
        <div class="stat-panel" style="background: #000;">
            <h4 style="font-size: 10px; color: var(--gold); letter-spacing: 2px;">NOTIFICATIONS</h4>
            <div style="margin-top: 20px; font-size: 12px; color: #666; line-height: 2;">
                • Monthly audit complete<br>
                • New strategy deployed
            </div>
            <button class="btn-action" style="background: #200; color: #fff; margin-top: 40px;" onclick="location.reload()">LOGOUT</button>
        </div>
    </div>
</div>

<div id="contact-page" class="view">
    <h2 style="font-family:'Cinzel'; color: var(--gold);">CONTACT US</h2>
</div>

<div class="ticker">
    <div class="ticker-inner" id="ticker-box"></div>
</div>

<script>
    function show(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id + '-page').classList.add('active');
    }

    function login() {
        const ph = document.getElementById('u_tel').value;
        const ps = document.getElementById('u_pass').value;
        if(ph.length > 5 && ps.length > 2) {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('dashboard').style.display = 'grid';
        }
    }

    const stocks = [
        {n: "TA-35", v: "2,145", c: "+0.4%"},
        {n: "BANKS", v: "3,890", c: "-0.2%"},
        {n: "SOXS", v: "32.1", c: "-4.2%"},
        {n: "GOLD", v: "2,150", c: "+0.9%"},
        {name: "ELDOR", v: "142.0", c: "+1.1%"}
    ];

    window.onload = function() {
        const box = document.getElementById('ticker-box');
        const content = stocks.map(s => `<div class="ticker-item"><b>${s.n || s.name}</b> ${s.v} <span style="color:${s.c.includes('-')?'#ff4444':'#00ffaa'}">${s.c}</span></div>`).join('');
        box.innerHTML = content + content;

        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 50 },
                "color": { "value": "#c5a059" },
                "size": { "value": 1 },
                "line_linked": { "enable": true, "distance": 150, "color": "#c5a059", "opacity": 0.1 },
                "move": { "enable": true, "speed": 1 }
            }
        });
    };
</script>
</body>
</html>
