<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELDOR GROUP | Investment Management</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@100;300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>
    
    <style>
        :root { 
            --gold: #c5a059; 
            --bg: #000000;
            --panel: #0a0a0a;
            --border: rgba(197, 160, 89, 0.2);
        }

        /* מניעת פריצת רזולוציה ויישור RTL */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        ::-webkit-scrollbar { display: none; }
        
        body, html { 
            background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; 
            height: 100dvh; width: 100vw; overflow: hidden; position: fixed;
            direction: rtl;
        }

        #particles-js { position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.2; }

        /* HEADER */
        header {
            position: fixed; top: 0; width: 100%; height: 75px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 5000; padding: 0 5%; background: rgba(0,0,0,0.9);
            border-bottom: 1px solid var(--border);
        }
        .logo { font-family: 'Cinzel', serif; font-size: 22px; letter-spacing: 5px; color: #fff; text-decoration: none; }
        .logo span { color: var(--gold); font-weight: 700; }

        /* ניווט ימני */
        nav.side-nav {
            position: fixed; right: 0; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 10px; z-index: 6000;
        }
        .nav-item {
            background: var(--panel); border: 1px solid var(--border);
            height: 50px; width: 50px; border-radius: 25px 0 0 25px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s;
        }
        .nav-item:hover { border-color: var(--gold); background: #111; }
        .nav-item i { color: var(--gold); font-size: 18px; }

        /* קונטיינר מרכזי מוגבל רזולוציה */
        .wrapper {
            max-width: 1100px; margin: 0 auto; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            position: relative; z-index: 100; padding: 0 20px;
        }

        .view { display: none; width: 100%; }
        .view.active { display: flex; flex-direction: column; animation: fadeIn 0.5s ease; }

        /* האזור האישי - העיצוב היוקרתי */
        .auth-card {
            width: 100%; max-width: 380px; background: #050505;
            padding: 50px 40px; border: 1px solid var(--border);
            text-align: right; border-top: 3px solid var(--gold);
            box-shadow: 0 40px 100px rgba(0,0,0,0.8); margin: 0 auto;
        }
        .auth-card h2 { font-family: 'Cinzel'; text-align: center; margin-bottom: 40px; letter-spacing: 4px; font-weight: 400; }
        
        .field { margin-bottom: 25px; }
        .field label { font-size: 10px; color: var(--gold); letter-spacing: 2px; display: block; margin-bottom: 8px; }
        .field input { 
            width: 100%; padding: 10px 0; background: transparent; 
            border: none; border-bottom: 1px solid #222; color: #fff; 
            font-size: 17px; outline: none; transition: 0.3s;
        }
        .field input:focus { border-bottom-color: var(--gold); }

        .btn-prime {
            background: var(--gold); color: #000; border: none; width: 100%;
            padding: 16px; font-weight: 800; font-size: 11px; letter-spacing: 3px;
            cursor: pointer; transition: 0.3s; margin-top: 15px;
        }

        /* דשבורד - רובליקות בהתאמה אישית */
        .dash-layout { 
            display: grid; grid-template-columns: 1fr 300px; gap: 20px; width: 100%;
        }
        .panel { background: var(--panel); border: 1px solid var(--border); padding: 35px; }
        
        .rubrics { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 25px; }
        .rubric-box { background: #000; border: 1px solid #151515; padding: 25px 15px; text-align: center; }
        .rubric-box label { font-size: 9px; color: var(--gold); display: block; margin-bottom: 12px; letter-spacing: 2px; }
        .rubric-box div { font-size: 22px; font-weight: 200; }

        /* TICKER - המלל שביקשת מהשיחות */
        .ticker {
            position: fixed; bottom: 0; width: 100%; height: 38px;
            background: #000; border-top: 1px solid #111;
            z-index: 9000; display: flex; align-items: center; overflow: hidden;
        }
        .ticker-track { display: flex; white-space: nowrap; animation: scroll 40s linear infinite; }
        .ticker-unit { padding: 0 35px; font-size: 11px; font-weight: 700; letter-spacing: 1px; }
        .ticker-unit b { color: var(--gold); margin-left: 5px; }

        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(100%); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 900px) {
            .dash-layout { grid-template-columns: 1fr; }
            nav.side-nav { bottom: 0; top: auto; right: 0; left: 0; transform: none; flex-direction: row; width: 100%; height: 65px; background: #000; border-top: 1px solid var(--gold); }
            .nav-item { width: 33.3%; border-radius: 0; border: none; height: 100%; }
            .ticker { bottom: 65px; }
            .wrapper { padding-top: 80px; padding-bottom: 140px; align-items: flex-start; }
        }
    </style>
</head>
<body>

<div id="particles-js"></div>

<header>
    <a href="#" class="logo" onclick="page('home')">ELDOR <span>GROUP</span></a>
    <div style="font-size: 9px; color: #444; letter-spacing: 2px;">INVESTMENT FIRM</div>
</header>

<nav class="side-nav">
    <div class="nav-item" onclick="page('vault')"><i class="fa-solid fa-user-tie"></i></div>
    <div class="nav-item" onclick="page('home')"><i class="fa-solid fa-house"></i></div>
    <div class="nav-item" onclick="page('contact')"><i class="fa-solid fa-headset"></i></div>
</nav>

<div class="wrapper">
    <div id="home-p" class="view active" style="text-align: center;">
        <h1 style="font-family:'Cinzel'; font-size: clamp(35px, 8vw, 90px); letter-spacing: 15px; font-weight: 100;">ELDOR</h1>
        <p style="color: var(--gold); letter-spacing: 8px; margin-top: 15px; font-size: 12px;">EXCELLENCE IN CAPITAL</p>
    </div>

    <div id="vault-p" class="view">
        <div id="auth-ui" class="auth-card">
            <h2>כניסת משקיע</h2>
            <div class="field">
                <label>מספר טלפון</label>
                <input type="tel" id="tel">
            </div>
            <div class="field">
                <label>קוד גישה</label>
                <input type="password" id="pin">
            </div>
            <button class="btn-prime" onclick="unlock()">כניסה לכספת</button>
        </div>

        <div id="dash-ui" class="dash-layout" style="display: none;">
            <div class="panel">
                <h3 style="font-family:'Cinzel'; color: var(--gold); margin-bottom: 25px; letter-spacing: 2px;">סטטוס פורטפוליו</h3>
                <div class="rubrics">
                    <div class="rubric-box"><label>שווי נכסים כולל</label><div>₪1,450,230</div></div>
                    <div class="rubric-box"><label>תשואה מצטברת</label><div style="color: #00ffaa;">+12.42%</div></div>
                    <div class="rubric-box"><label>דיבידנדים לחלוקה</label><div>₪12,400</div></div>
                    <div class="rubric-box"><label>רמת סיכון</label><div>MODERATE</div></div>
                </div>
            </div>
            <div class="panel" style="background: #000;">
                <h4 style="font-size: 10px; color: var(--gold); letter-spacing: 2px; margin-bottom: 20px;">עדכוני מערכת</h4>
                <div style="font-size: 12px; color: #555; line-height: 2.2;">
                    • בוצעה רוטציה למגזר הביטחוני (אלביט/נקסט ויז'ן)<br>
                    • מודל חלוקה חודשי/שנתי עודכן<br>
                    • נתוני נדל"ן וביטחונות סונכרנו
                </div>
                <button class="btn-prime" style="background: #1a0000; color: #fff; margin-top: 40px; border: 1px solid #300;" onclick="location.reload()">יציאה מאובטחת</button>
            </div>
        </div>
    </div>

    <div id="contact-p" class="view" style="text-align: center;">
        <h2 style="font-family:'Cinzel'; color: var(--gold);">יצירת קשר</h2>
    </div>
</div>

<div class="ticker">
    <div class="ticker-track" id="ticker-data"></div>
</div>

<script>
    function page(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id + '-p').classList.add('active');
    }

    function unlock() {
        if(document.getElementById('tel').value.length > 5) {
            document.getElementById('auth-ui').style.display = 'none';
            document.getElementById('dash-ui').style.display = (window.innerWidth > 900) ? 'grid' : 'flex';
            document.getElementById('dash-ui').style.flexDirection = 'column';
        }
    }

    const stocks = [
        {n: "ת\"א 35", v: "2,145", c: "+0.45%"},
        {n: "מדד הבנקים", v: "3,890", c: "-0.22%"},
        {n: "תל אביב 125", v: "2,080", c: "-0.56%"},
        {n: "SOXS", v: "32.14", c: "-4.20%"},
        {n: "S&P 500", v: "5,123", c: "+0.15%"},
        {n: "GOLD", v: "2,150", c: "+0.88%"}
    ];

    window.onload = function() {
        const wrap = document.getElementById('ticker-data');
        const html = stocks.map(s => `<div class="ticker-unit"><b>${s.n}</b> ${s.v} <span style="color:${s.c.includes('-')?'#ff4444':'#00ffaa'}">${s.c}</span></div>`).join('');
        wrap.innerHTML = html + html;

        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 40 },
                "color": { "value": "#c5a059" },
                "size": { "value": 1 },
                "line_linked": { "enable": true, "distance": 150, "color": "#c5a059", "opacity": 0.1 },
                "move": { "enable": true, "speed": 0.8 }
            }
        });
    };
</script>
</body>
</html>
