<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מטריצת הערכה אינטראקטיבית</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .modal { display: none; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="bg-gray-100 p-6">

    <div class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold mb-6 text-center">מטריצת הערכה</h1>
        
        <div id="matrix-container" class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <!-- כאן יוזרקו הרובריקות -->
        </div>
    </div>

    <!-- חלון פירוט (Modal) -->
    <div id="details-modal" class="modal fixed inset-0 bg-black bg-opacity-50 items-center justify-center p-4">
        <div class="bg-white rounded-lg p-6 max-w-lg w-full">
            <h2 id="modal-title" class="text-xl font-bold mb-4"></h2>
            <p id="modal-content" class="text-gray-700 mb-6"></p>
            <button onclick="closeModal()" class="bg-blue-600 text-white px-4 py-2 rounded">סגור</button>
        </div>
    </div>

    <script>
        const data = [
            { id: 1, title: "חדשנות", summary: "רמת המקוריות של הפרויקט", details: "פירוט מלא: כאן נכנסת כל הלוגיקה של איך הפרויקט משנה את הסטטוס קוו ומהן רמות החדשנות הטכנולוגית." },
            { id: 2, title: "ישימות", summary: "עד כמה הפתרון ניתן לביצוע", details: "פירוט מלא: בחינת המשאבים, הזמן והיכולת הטכנית להוציא את הפרויקט אל הפועל בטווח זמן סביר." },
            { id: 3, title: "אימפקט", summary: "השפעה על קהל היעד", details: "פירוט מלא: ניתוח כמותי ואיכותני של הערך המוסף לקהל המשתמשים או לארגון." }
        ];

        const container = document.getElementById('matrix-container');

        data.forEach(item => {
            const card = document.createElement('div');
            card.className = "bg-white p-6 rounded-lg shadow cursor-pointer hover:bg-blue-50 transition border-r-4 border-blue-600";
            card.innerHTML = `
                <h3 class="font-bold text-lg">${item.title}</h3>
                <p class="text-sm text-gray-500 mt-2">${item.summary}</p>
            `;
            
            // לחיצה לפתיחת פירוט
            card.onclick = () => openModal(item);
            
            container.appendChild(card);
        });

        function openModal(item) {
            document.getElementById('modal-title').innerText = item.title;
            document.getElementById('modal-content').innerText = item.details;
            document.getElementById('details-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('details-modal').classList.remove('active');
        }
    </script>
</body>
</html>
