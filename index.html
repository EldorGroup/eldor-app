<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELDOR GROUP | Asset Management Terminal</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Montserrat:wght@600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0a0f1c; 
            --panel-bg: #111827;
            --panel-border: rgba(197, 160, 89, 0.25);
            --gold: #c5a059;
            --gold-bright: #f1d392;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            
            /* צבעי פיצה מובהקים */
            --color-tech: #f1d392;
            --color-def: #d97706;
            --color-liq: #475569;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        
        body { 
            background: var(--bg-color); color: var(--text-main); font-family: 'Heebo', sans-serif; 
            min-height: 100vh; overflow-x: hidden; display: flex; flex-direction: column;
            background-image: radial-gradient(circle at 50% 0%, #151f32 0%, transparent 70%);
        }

        body.privacy-mode .sensitive-data { filter: blur(8px); opacity: 0.5; pointer-events: none; }

        /* סרגל עליון */
        header { height: 70px; display: flex; justify-content: space-between; align-items: center; padding: 0 4%; background: rgba(10, 15, 28, 0.95); border-bottom: 1px solid var(--panel-border); z-index: 1000; }
        .logo-small { font-family: 'Montserrat', sans-serif; font-size: 22px; font-weight: 900; background: linear-gradient(135deg, #c5a059, #f1d392); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px; }
        .btn-vault { background: linear-gradient(135deg, #c5a059, #f1d392); color: #000; border: none; padding: 8px 18px; border-radius: 6px; font-weight: 800; cursor: pointer; font-size: 13px; }

        /* מבנה דשבורד */
        .app-container { flex-grow: 1; padding: 30px 4%; max-width: 1300px; margin: 0 auto; width: 100%; }
        .main-stage { background: var(--panel-bg); border: 1px solid var(--panel-border); border-radius: 16px; padding: 30px; box-shadow: 0 15px 50px rgba(0,0,0,0.6); min-height: 70vh; position: relative; }

        #welcome-view, #login-phone-view, #login-pin-view { display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; min-height: 50vh; }
        #login-phone-view, #login-pin-view, #dashboard-view { display: none; }

        /* התחברות */
        .login-input { background: #000; border: 1px solid var(--gold); width: 280px; padding: 15px; text-align: center; font-size: 22px; color: var(--gold-bright); border-radius: 10px; margin: 20px 0; outline: none; font-family: 'Montserrat'; letter-spacing: 3px; }
        .pin-dots { display: flex; gap: 15px; margin: 20px 0; }
        .pin-dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--gold); }
        .pin-dot.filled { background: var(--gold-bright); box-shadow: 0 0 10px var(--gold-bright); }
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; max-width: 260px; }
        .num-btn { background: #1f2937; border: 1px solid var(--panel-border); border-radius: 50%; color: #fff; width: 65px; height: 65px; font-size: 22px; font-weight: 700; cursor: pointer; }

        /* דשבורד פנימי */
        .dash-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; }
        .stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-tile { background: rgba(0,0,0,0.2); border: 1px solid var(--panel-border); padding: 20px 10px; border-radius: 10px; text-align: center; }
        .stat-tile label { font-size: 12px; color: var(--text-muted); display: block; margin-bottom: 5px; }
        .stat-tile b { font-family: 'Montserrat'; font-size: 20px; color: #fff; }

        .bottom-grid { display: grid; grid-template-columns: 1fr 1.2fr 1.8fr; gap: 20px; }
        .content-box { background: rgba(0,0,0,0.2); border: 1px solid var(--panel-border); border-radius: 12px; padding: 20px; min-height: 300px; display: flex; flex-direction: column; }
        .box-title { font-size: 11px; color: var(--gold-bright); font-weight: 900; margin-bottom: 15px; text-align: right; border-bottom: 1px dashed rgba(197,160,89,0.2); padding-bottom: 10px; }

        /* הפיצה (SVG) */
        .donut-wrap { position: relative; width: 140px; height: 140px; margin: 0 auto 20px auto; }
        .donut-svg { transform: rotate(-90deg); width: 100%; height: 100%; }
        .donut-svg circle { fill: transparent; stroke-width: 5; transition: 1s; }
        .donut-bg { stroke: rgba(255,255,255,0.05); }
        .donut-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .donut-center b { font-size: 20px; font-family: 'Montserrat'; }

        .legend { display: flex; flex-direction: column; gap: 8px; width: 100%; }
        .legend-item { display: flex; justify-content: space-between; font-size: 12px; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 6px; }

        /* איתותים */
        .feed-list { flex-grow: 1; overflow-y: auto; }
        .feed-item { font-size: 11px; border-right: 2px solid var(--gold); padding: 8px; margin-bottom: 10px; background: rgba(255,255,255,0.02); }

        /* גרף קווי */
        .chart-svg { width: 100%; height: 150px; overflow: visible; }
        .chart-line { fill: none; stroke: var(--gold); stroke-width: 3; stroke-linecap: round; }
        .chart-area { fill: rgba(197, 160, 89, 0.1); }

        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: #1f2937; border: 1px solid var(--gold); padding: 12px 25px; border-radius: 30px; transition: 0.4s; z-index: 2000; }
        #toast.show { top: 20px; }

        @media (max-width: 1000px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .bottom-grid { grid-template-columns: 1fr; }
            .app-container { padding: 15px; }
        }
    </style>
</head>
<body>

<header>
    <button class="btn-vault" id="login-btn" onclick="startLogin()">כניסת משקיע</button>
    <div class="logo-small">ELDOR GROUP</div>
</header>

<div id="toast"></div>

<div class="app-container">
    <div class="main-stage">
        
        <div id="welcome-view">
            <h1 class="big-logo">ELDOR GROUP</h1>
            <p class="sub-logo">ניהול השקעות וטכנולוגיית קצה</p>
        </div>

        <div id="login-phone-view">
            <h2>זיהוי טלפוני</h2>
            <input type="tel" id="phone-input" class="login-input" placeholder="05XXXXXXXX">
            <button class="btn-vault" onclick="toPin()">המשך</button>
        </div>

        <div id="login-pin-view">
            <h2>הזן קוד PIN</h2>
            <div class="pin-dots" id="pin-dots">
                <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
            </div>
            <div class="numpad">
                <button class="num-btn" onclick="pressNum(1)">1</button><button class="num-btn" onclick="pressNum(2)">2</button><button class="num-btn" onclick="pressNum(3)">3</button>
                <button class="num-btn" onclick="pressNum(4)">4</button><button class="num-btn" onclick="pressNum(5)">5</button><button class="num-btn" onclick="pressNum(6)">6</button>
                <button class="num-btn" onclick="pressNum(7)">7</button><button class="num-btn" onclick="pressNum(8)">8</button><button class="num-btn" onclick="pressNum(9)">9</button>
                <button class="num-btn" style="background:none;border:none;" onclick="clearPin()">C</button><button class="num-btn" onclick="pressNum(0)">0</button>
            </div>
        </div>

        <div id="dashboard-view">
            <div class="dash-header">
                <div>
                    <h2 id="client-name">שלום, משקיע</h2>
                    <div class="dash-update" id="last-update">מעדכן נתונים...</div>
                </div>
                <div style="display:flex; gap:10px;">
                    <button class="btn-vault" onclick="togglePrivacy()">פרטיות</button>
                    <button class="btn-vault" style="background:red; color:white;" onclick="location.reload()">יציאה</button>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-tile"><label>מסלול</label><b id="stat-track">---</b></div>
                <div class="stat-tile"><label>תשואה YTD</label><b id="stat-yield" class="sensitive-data" style="color:var(--success);">0%</b></div>
                <div class="stat-tile"><label>שווי תיק</label><b id="stat-val" class="sensitive-data">₪0</b></div>
                <div class="stat-tile"><label>הפקדות</label><b id="stat-dep" class="sensitive-data">₪0</b></div>
                <div class="stat-tile"><label>הצטרפות</label><b id="stat-date">--/----</b></div>
            </div>

            <div class="bottom-grid">
                <div class="content-box">
                    <div class="box-title">איתותי מערכת</div>
                    <div class="feed-list" id="feed"></div>
                </div>

                <div class="content-box">
                    <div class="box-title">פילוח נכסים</div>
                    <div class="donut-wrap">
                        <svg viewBox="0 0 42 42" class="donut-svg">
                            <circle class="donut-bg" cx="21" cy="21" r="15.9"></circle>
                            <circle id="piz-tech" cx="21" cy="21" r="15.9" stroke="var(--color-tech)"></circle>
                            <circle id="piz-def" cx="21" cy="21" r="15.9" stroke="var(--color-def)"></circle>
                            <circle id="piz-liq" cx="21" cy="21" r="15.9" stroke="var(--color-liq)"></circle>
                        </svg>
                        <div class="donut-center"><b id="piz-total">0%</b><span>סה"כ</span></div>
                    </div>
                    <div class="legend">
                        <div class="legend-item"><span>טכנולוגיה</span><b id="txt-tech">0%</b></div>
                        <div class="legend-item"><span>ביטחוניות</span><b id="txt-def">0%</b></div>
                        <div class="legend-item"><span>נזילות</span><b id="txt-liq">0%</b></div>
                    </div>
                </div>

                <div class="content-box">
                    <div class="box-title">מדד צמיחה</div>
                    <svg class="chart-svg" viewBox="0 0 100 40">
                        <path id="chart-a" class="chart-area"></path>
                        <path id="chart-l" class="chart-line"></path>
                    </svg>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbxgFkqUPfmgiGGRnPsCxxsB9CdQfRbRSY5tpBLe0jS7OWJOEjJfTeXJCpWZ2ZoXe9c-aw/exec";
    let pin = "";

    function showToast(m) { 
        const t = document.getElementById('toast'); t.innerText = m; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    function startLogin() {
        document.getElementById('welcome-view').style.display = 'none';
        document.getElementById('login-phone-view').style.display = 'flex';
    }

    function toPin() {
        if(document.getElementById('phone-input').value.length < 9) return showToast("טלפון לא תקין");
        document.getElementById('login-phone-view').style.display = 'none';
        document.getElementById('login-pin-view').style.display = 'flex';
    }

    function pressNum(n) {
        if(pin.length < 4) {
            pin += n;
            updateDots();
            if(pin.length === 4) login();
        }
    }

    function updateDots() {
        const dots = document.querySelectorAll('.pin-dot');
        dots.forEach((d, i) => d.classList.toggle('filled', i < pin.length));
    }

    function clearPin() { pin = ""; updateDots(); }

    function togglePrivacy() { document.body.classList.toggle('privacy-mode'); }

    // פונקציית הניקוי האבסולוטית - כאן נפתרת בעיית הפיצה
    function clean(v) {
        if(!v) return 0;
        let s = String(v).replace(/[^0-9.-]/g, '');
        let n = parseFloat(s);
        if(isNaN(n)) return 0;
        if(n > 0 && n < 1 && !String(v).includes('%')) return Math.round(n * 100);
        return Math.abs(Math.round(n));
    }

    async function login() {
        const tel = document.getElementById('phone-input').value;
        showToast("מתחבר...");
        try {
            const res = await fetch(`${API}?phone=${tel}&pin=${pin}`);
            const json = await res.json();
            if(json.status === "success") {
                render(json.data);
            } else {
                showToast("קוד שגוי"); clearPin();
            }
        } catch(e) { showToast("שגיאת שרת"); clearPin(); }
    }

    function render(d) {
        document.getElementById('login-pin-view').style.display = 'none';
        document.getElementById('dashboard-view').style.display = 'flex';
        document.body.classList.add('active-dash');

        document.getElementById('client-name').innerText = "שלום, " + d.fullName;
        document.getElementById('stat-track').innerText = d.track;
        document.getElementById('stat-date').innerText = d.startDate;
        document.getElementById('last-update').innerText = "עדכון: " + d.lastUpdate;

        const val = clean(d.currentValue);
        const dep = clean(d.totalDeposits);
        document.getElementById('stat-val').innerText = "₪" + val.toLocaleString();
        document.getElementById('stat-dep').innerText = "₪" + dep.toLocaleString();
        document.getElementById('stat-yield').innerText = d.yield;

        // פיצה
        const t = clean(d.tech), f = clean(d.defense), l = clean(d.liquid);
        const total = t + f + l;
        document.getElementById('txt-tech').innerText = t + "%";
        document.getElementById('txt-def').innerText = f + "%";
        document.getElementById('txt-liq').innerText = l + "%";
        document.getElementById('piz-total').innerText = total > 0 ? "100%" : "0%";

        if(total > 0) {
            const sT = (t/total)*100, sF = (f/total)*100, sL = (l/total)*100;
            document.getElementById('piz-tech').style.strokeDasharray = `${sT} 100`;
            document.getElementById('piz-def').style.strokeDasharray = `${sF} 100`;
            document.getElementById('piz-def').style.strokeDashoffset = `-${sT}`;
            document.getElementById('piz-liq').style.strokeDasharray = `${sL} 100`;
            document.getElementById('piz-liq').style.strokeDashoffset = `-${sT + sF}`;
        }

        // גרף
        const ratio = val / (dep || 1);
        const endY = ratio > 1 ? 10 : 30;
        const path = `M0,35 L25,30 L50,32 L75,20 L100,${endY}`;
        document.getElementById('chart-l').setAttribute('d', path);
        document.getElementById('chart-a').setAttribute('d', path + " L100,40 L0,40 Z");

        // פיד
        const feed = document.getElementById('feed');
        feed.innerHTML = `<div class="feed-item">המערכת זוהתה בהצלחה עבור ${d.fullName}</div><div class="feed-item">סנכרון נתונים מול Google Sheets הושלם.</div>`;
    }
</script>
</body>
</html>
