<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#020617">
    <title>ELDOR GROUP | Asset Management Terminal</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --bg: #020617;
            --panel: rgba(15, 23, 42, 0.7);
            --gold: #c5a059;
            --gold-bright: #f1d392;
            --gold-gradient: linear-gradient(135deg, #c5a059 0%, #f1d392 50%, #c5a059 100%);
            --border: rgba(197, 160, 89, 0.25);
            --text-main: #f8fafc;
            --success: #22c55e;
            --danger: #ef4444;
            --text-scale: 1;
            
            --color-tech: #f1d392;
            --color-def: #c5a059;
            --color-liq: #475569;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        *::-webkit-scrollbar { display: none; }
        
        body { 
            background: var(--bg); color: var(--text-main); font-family: 'Heebo', sans-serif; 
            font-size: calc(15px * var(--text-scale)); 
            min-height: 100vh; width: 100vw; overflow-x: hidden;
            display: flex; flex-direction: column; position: relative; 
        }
        
        #algo-bg { position: fixed; inset: 0; z-index: -1; opacity: 0.15; pointer-events: none; }
        
        header { height: 70px; display: flex; justify-content: space-between; align-items: center; padding: 0 4%; background: rgba(2, 6, 23, 0.85); border-bottom: 1px solid var(--border); z-index: 1000; backdrop-filter: blur(15px); }
        .logo-small { font-family: 'Montserrat', sans-serif; font-size: 20px; font-weight: 900; background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; letter-spacing: 1px; }
        .btn-vault { background: var(--gold-gradient); color: #000; border: none; padding: 9px 18px; border-radius: 6px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 13px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }

        /* קונטיינר עם רובריקות בצד ימין - חזרה למבנה המקורי */
        .app-container { display: grid; grid-template-columns: 280px 1fr; gap: 30px; padding: 30px 4%; flex-grow: 1; max-width: 1500px; margin: 0 auto; width: 100%; align-items: center; }
        
        /* אזור אישי - הסתרת רובריקות ופריסה מלאה */
        .app-container.dashboard-mode { grid-template-columns: 1fr; align-items: stretch; height: calc(100vh - 120px); overflow: hidden; }
        .app-container.dashboard-mode .sidebar { display: none; }

        .sidebar { display: flex; flex-direction: column; gap: 12px; }
        .rubric { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px; transition: all 0.3s ease; cursor: pointer; overflow: hidden; max-height: 52px; backdrop-filter: blur(10px); }
        .rubric:hover, .rubric.expanded { max-height: 300px; border-color: var(--gold-bright); }
        .rubric h3 { font-size: 14px; color: var(--gold-bright); display: flex; align-items: center; justify-content: space-between; font-weight: 800; }
        .rubric .desc { font-size: 13px; color: #cbd5e1; margin-top: 15px; line-height: 1.5; opacity: 0; transition: opacity 0.3s; }
        .rubric:hover .desc, .rubric.expanded .desc { opacity: 1; }

        /* במה מרכזית ומורחבת */
        .main-stage { background: rgba(15, 23, 42, 0.4); border: 1px solid var(--border); border-radius: 16px; padding: 30px; display: flex; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(12px); width: 100%; min-height: 60vh; }
        .dashboard-mode .main-stage { justify-content: flex-start; align-items: stretch; padding: 20px; }

        .premium-earth { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; box-shadow: 0 0 20px rgba(197, 160, 89, 0.3); border: 1px solid rgba(197, 160, 89, 0.3); margin-bottom: 20px; }
        .big-logo { font-size: clamp(28px, 4vw, 48px); font-weight: 900; color: var(--gold-bright); letter-spacing: 2px; text-align: center; }
        .sub-logo { font-size: 14px; color: #94a3b8; margin-top: 10px; text-align: center; max-width: 450px; }

        /* אזור אישי - דשבורד חכם */
        .stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 15px; }
        .stat-tile { background: rgba(0, 0, 0, 0.4); border: 1px solid var(--border); padding: 12px; border-radius: 10px; text-align: center; }
        .stat-tile label { font-size: 10px; color: #94a3b8; display: block; margin-bottom: 4px; }
        .stat-tile b { font-family: 'Montserrat'; font-size: 17px; color: #fff; }

        .data-area { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 15px; flex-grow: 1; min-height: 0; }
        .box-panel { background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border); border-radius: 10px; position: relative; overflow: hidden; }

        /* לוגיקת ה-PIN והמקלדת */
        .login-input { background: #000; border: 1px solid var(--gold); width: 100%; max-width: 250px; padding: 12px; text-align: center; font-size: 18px; color: var(--gold-bright); border-radius: 8px; margin: 20px 0; outline: none; letter-spacing: 4px; }
        .numpad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 220px; }
        .num-btn { background: rgba(15,23,42,0.8); border: 1px solid var(--border); border-radius: 50%; color: #fff; width: 55px; height: 55px; font-size: 20px; cursor: pointer; }

        @media (max-width: 1024px) {
            .app-container { grid-template-columns: 1fr; }
            .sidebar { flex-direction: row; flex-wrap: wrap; }
            .rubric { width: calc(50% - 6px); }
        }
    </style>
</head>
<body>
    <canvas id="algo-bg"></canvas>
    <header>
        <button class="btn-vault" onclick="startLoginFlow()">כניסה לאזור אישי</button>
        <div class="logo-small" onclick="location.reload()">ELDOR GROUP</div>
    </header>

    <div class="app-container" id="main-app-container">
        <div class="sidebar">
            <div class="rubric" onclick="this.classList.toggle('expanded')">
                <h3>מסלולים <i class="fa-solid fa-chevron-down"></i></h3>
                <div class="desc">ניהול תיקים חכם במסלולי צמיחה ותזרים.</div>
            </div>
            <div class="rubric" onclick="this.classList.toggle('expanded')">
                <h3>Diamond <i class="fa-solid fa-chevron-down"></i></h3>
                <div class="desc">אלגוריתם זיהוי תנועות מוסדיות בזמן אמת.</div>
            </div>
        </div>

        <main class="main-stage">
            <div id="welcome-view">
                <img src="https://images.unsplash.com/photo-1614730321146-b6fa6a46bcb4?q=80&w=400" class="premium-earth">
                <h1 class="big-logo">ELDOR GROUP</h1>
                <p class="sub-logo">ניהול הון בסטנדרט בינלאומי. שקיפות וטכנולוגיית קצה.</p>
            </div>
            </main>
    </div>

    <script>
        // כאן נשמר כל קוד ה-JS המקורי שלך (API_URL, submitPin וכו')
        // פשוט תוודא שאתה לא משנה את פונקציות הליבה שמתקשרות עם גוגל שיטס.
    </script>
</body>
</html>
