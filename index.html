<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELDOR GROUP | Official Private Vault</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@100;300;600;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>
    
    <style>
        :root { 
            --gold: #c5a059; 
            --gold-bg: rgba(197, 160, 89, 0.1);
            --bg: #000000;
            --card: #0a0a0a;
            --border: #1a1a1a;
        }

        /* הגדרות בסיס למניעת באגים ברזולוציה */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        ::-webkit-scrollbar { display: none; }
        
        body, html { 
            background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; 
            min-height: 100dvh; width: 100%; overflow-x: hidden;
        }

        #particles-js { position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.3; }

        /* HEADER */
        header {
            position: fixed; top: 0; width: 100%; height: 80px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 5000; padding: 0 5%; background: rgba(0,0,0,0.9);
            border-bottom: 1px solid var(--border);
        }
        .logo { font-family: 'Cinzel', serif; font-size: 22px; letter-spacing: 6px; color: #fff; text-decoration: none; }
        .logo span { color: var(--gold); font-weight: 700; }

        /* ניווט צד יוקרתי */
        nav.main-nav {
            position: fixed; left: 0; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 8px; z-index: 6000;
        }
        .nav-link {
            background: var(--card); border: 1px solid var(--border);
            height: 55px; width: 55px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; border-radius: 0 5px 5px 0;
        }
        .nav-link i { color: var(--gold); font-size: 20px; }
        .nav-link:hover { background: var(--gold); }
        .nav-link:hover i { color: #000; }

        /* CONTENT WRAPPER */
        .container { 
            max-width: 1150px; margin: 0 auto; width: 100%; padding: 120px 20px 100px;
            position: relative; z-index: 100;
        }
        
        .view { display: none; width: 100%; }
        .view.active { display: block; animation: fadeIn 0.5s ease forwards; }

        /* אזור אישי - THE VAULT DESIGN */
        .vault-box { 
            max-width: 400px; margin: 40px auto; background: #080808;
            padding: 50px 40px; border: 1px solid var(--border);
            text-align: center; border-top: 4px solid var(--gold);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }
        .vault-box h2 { font-family: 'Cinzel'; font-size: 20px; margin-bottom: 40px; letter-spacing: 5px; }
        
        .input-group { margin-bottom: 25px; text-align: right; }
        .input-group label { font-size: 10px; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; }
        .input-group input { 
            width: 100%; padding: 15px 0; background: transparent; 
            border: none; border-bottom: 1px solid #222; color: #fff; 
            font-size: 17px; transition: 0.3s; outline: none;
        }
        .input-group input:focus { border-bottom-color: var(--gold); }

        .btn-gold {
            background: var(--gold); color: #000; border: none; width: 100%;
            padding: 18px; font-weight: 800; font-size: 12px; letter-spacing: 3px;
            cursor: pointer; transition: 0.3s; margin-top: 20px;
        }
        .btn-gold:hover { filter: brightness(1.2); transform: translateY(-2px); }

        /* דשבורד לקוחות - נתונים מלאים */
        .dashboard-grid { 
            display: grid; grid-template-columns: 1fr 320px; gap: 25px; 
        }
        .main-panel { background: var(--card); border: 1px solid var(--border); padding: 40px; }
        
        .stats-container { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; margin-bottom: 40px; 
        }
        .stat-card { 
            background: #000; border: 1px solid #151515; padding: 30px 20px; text-align: center;
            min-height: 140px; display: flex; flex-direction: column; justify-content: center;
        }
        .stat-card label { font-size: 10px; color: var(--gold); margin-bottom: 15px; letter-spacing: 3px; }
        .stat-card span { font-size: 26px; font-weight: 200; }

        /* TICKER - המניות שביקשת */
        .ticker {
            position: fixed; bottom: 0; width: 100%; height: 40px;
            background: #030303; border-top: 1px solid #111;
            z-index: 9000; display: flex; align-items: center; overflow: hidden;
        }
        .ticker-track { display: flex; white-space: nowrap; animation: ticker-scroll 35s linear infinite; }
        .ticker-item { padding: 0 30px; font-size: 12px; font-weight: 600; }
        .ticker-item b { color: var(--gold); margin-left: 8px; }
        @keyframes ticker-scroll { from { transform: translateX(0); } to { transform: translateX(100%); } }

        /* MOBILE FIX */
        @media (max-width: 900px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            header { height: 70px; }
            .container { padding-top: 100px; }
            nav.main-nav { 
                left: auto; bottom: 0; top: auto; transform: none; 
                flex-direction: row; width: 100%; height: 65px; background: #000; border-top: 1px solid var(--gold);
            }
            .nav-link { width: 25%; border-radius: 0; border: none; height: 100%; }
            .ticker { bottom: 65px; }
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="particles-js"></div>

<header>
    <a href="#" class="logo" onclick="switchPage('home')">ELDOR <span>GROUP</span></a>
    <div style="font-size: 9px; letter-spacing: 3px; color: #444;">EST. 2026</div>
</header>

<nav class="main-nav">
    <div class="nav-link" onclick="switchPage('vault')"><i class="fa-solid fa-vault"></i></div>
    <div class="nav-link" onclick="switchPage('home')"><i class="fa-solid fa-house"></i></div>
    <div class="nav-link" onclick="switchPage('contact')"><i class="fa-solid fa-paper-plane"></i></div>
</nav>

<div class="container">
    <div id="home-view" class="view active" style="text-align: center; margin-top: 10vh;">
        <h1 style="font-family:'Cinzel'; font-size: clamp(40px, 10vw, 100px); letter-spacing: 20px; font-weight: 100;">ELDOR</h1>
        <div style="width: 50px; height: 1px; background: var(--gold); margin: 30px auto;"></div>
        <p style="color: var(--gold); letter-spacing: 10px; font-size: 13px; font-weight: 300;">THE ARCHITECTURE OF WEALTH</p>
    </div>

    <div id="vault-view" class="view">
        <div id="login-ui" class="vault-box">
            <h2>SECURE ACCESS</h2>
            <div class="input-group">
                <label>Phone Number</label>
                <input type="tel" id="tel_input">
            </div>
            <div class="input-group">
                <label>Access Code</label>
                <input type="password" id="pass_input">
            </div>
            <button class="btn-gold" onclick="attemptLogin()">OPEN THE VAULT</button>
        </div>

        <div id="dash-ui" class="dashboard-grid" style="display: none;">
            <div class="main-panel">
                <h3 style="font-family:'Cinzel'; color: var(--gold); margin-bottom: 30px; letter-spacing: 3px;">PORTFOLIO SUMMARY</h3>
                <div class="stats-container">
                    <div class="stat-card"><label>TOTAL EQUITY</label><span>₪1,450,230</span></div>
                    <div class="stat-card"><label>YTD PERFORMANCE</label><span style="color: #00ffaa;">+12.42%</span></div>
                    <div class="stat-card"><label>OPEN POSITIONS</label><span>14</span></div>
                </div>
                <div style="height: 200px; border-bottom: 1px solid var(--gold); position: relative;">
                    <svg viewBox="0 0 1000 200" preserveAspectRatio="none" style="width:100%; height:100%;">
                        <path d="M0,180 Q150,150 300,160 T600,80 T1000,30" fill="none" stroke="var(--gold)" stroke-width="2" />
                    </svg>
                </div>
            </div>
            <div class="main-panel" style="background: #000;">
                <h4 style="font-size: 10px; color: var(--gold); letter-spacing: 2px; margin-bottom: 25px;">NOTIFICATIONS</h4>
                <div style="font-size: 13px; color: #666; line-height: 2.2;">
                    • נכסי נדל"ן עודכנו במערכת<br>
                    • דוח רבעוני Q1 מוכן לצפייה<br>
                    • בוצעה רוטציה למגזר הביטחוני
                </div>
                <button class="btn-gold" style="background: #200; color: #fff; margin-top: 50px;" onclick="location.reload()">LOGOUT</button>
            </div>
        </div>
    </div>

    <div id="contact-view" class="view" style="text-align: center;">
        <h2 style="font-family:'Cinzel'; color: var(--gold); margin-bottom: 40px;">CONTACT US</h2>
        <p>Direct Line: +972 5X-XXXXXXX</p>
    </div>
</div>

<div class="ticker">
    <div class="ticker-track" id="ticker-content"></div>
</div>

<script>
    function switchPage(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id + '-view').classList.add('active');
    }

    function attemptLogin() {
        const t = document.getElementById('tel_input').value;
        const p = document.getElementById('pass_input').value;
        if(t.length > 5 && p.length > 2) {
            document.getElementById('login-ui').style.display = 'none';
            document.getElementById('dash-ui').style.display = (window.innerWidth > 900) ? 'grid' : 'block';
        }
    }

    const marketData = [
        {n: "ת\"א 35", v: "2,145", c: "+0.45%"},
        {n: "מדד הבנקים", v: "3,890", c: "-0.22%"},
        {n: "SOXS", v: "32.14", c: "-4.20%"},
        {n: "S&P 500", v: "5,123", c: "+0.15%"},
        {n: "GOLD", v: "2,150", c: "+0.88%"},
        {n: "ELDOR FUND", v: "142.0", c: "+1.12%"}
    ];

    window.onload = function() {
        const track = document.getElementById('ticker-content');
        const html = marketData.map(s => `
            <div class="ticker-item">
                <b>${s.n}</b> ${s.v} <span style="color:${s.c.includes('-')?'#ff4444':'#00ffaa'}">${s.c}</span>
            </div>
        `).join('');
        track.innerHTML = html + html;

        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 60 },
                "color": { "value": "#c5a059" },
                "opacity": { "value": 0.4 },
                "size": { "value": 1 },
                "line_linked": { "enable": true, "distance": 150, "color": "#c5a059", "opacity": 0.1 },
                "move": { "enable": true, "speed": 1 }
            }
        });
    };
</script>
</body>
</html>
