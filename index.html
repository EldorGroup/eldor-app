<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELDOR GROUP | Excellence in Wealth Management</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@200;400;600&display=swap');

        :root { 
            --gold: #c5a059; /* הזהב המדויק מהתמונות שלך */
            --gold-glow: rgba(197, 160, 89, 0.4);
            --dark-bg: #000000;
            --card-bg: #0a0a0a;
            --border: #1a1a1a;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        ::-webkit-scrollbar { display: none; }
        
        body, html { 
            background: var(--dark-bg); color: #fff; 
            font-family: 'Inter', sans-serif; height: 100vh; width: 100vw; overflow: hidden;
        }

        /* שכבת רקע חלקיקים - הגדרה שמונעת חסימת לחיצות באופן מוחלט */
        #particles-js { position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.3; }

        header {
            position: fixed; top: 0; width: 100%; height: 100px;
            display: flex; justify-content: center; align-items: center;
            z-index: 2000; background: linear-gradient(to bottom, #000 0%, transparent 100%);
        }
        .logo { font-family: 'Cinzel', serif; font-size: 26px; letter-spacing: 12px; cursor: pointer; color: #fff; text-decoration: none; }
        .logo span { color: var(--gold); font-weight: 700; }

        .btn-portal-access {
            position: absolute; left: 5%; top: 30px;
            background: transparent; border: 1px solid var(--gold); color: var(--gold);
            padding: 12px 28px; font-size: 11px; font-weight: 800; letter-spacing: 3px;
            cursor: pointer; z-index: 2001; transition: 0.4s;
        }
        .btn-portal-access:hover { background: var(--gold); color: #000; box-shadow: 0 0 30px var(--gold-glow); }

        /* ניווט צד יוקרתי */
        nav.main-nav {
            position: fixed; right: 0; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 15px; z-index: 3000;
        }
        .nav-item {
            background: #080808; border: 1px solid var(--border);
            height: 60px; width: 60px; border-radius: 40px 0 0 40px;
            display: flex; align-items: center; padding-right: 22px;
            cursor: pointer; transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1); overflow: hidden;
        }
        .nav-item i { color: var(--gold); font-size: 1.4rem; min-width: 35px; }
        .nav-item span { opacity: 0; color: #fff; margin-right: 25px; white-space: nowrap; transition: 0.4s; font-size: 15px; }
        .nav-item:hover { width: 240px; border-color: var(--gold); }
        .nav-item:hover span { opacity: 1; }

        /* תצוגות הדפים */
        .page-content { position: fixed; inset: 0; display: none; padding: 140px 6% 80px; overflow-y: auto; z-index: 100; background: var(--dark-bg); }
        .page-content.active { display: block; animation: smoothIn 0.8s ease; }
        @keyframes smoothIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- אזור אישי: הרובליקות והמלל (תיקון רזולוציה) --- */
        .dashboard-wrapper { max-width: 1500px; margin: 0 auto; display: grid; grid-template-columns: 1fr 350px; gap: 40px; }
        
        .main-card {
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 50px; border-radius: 4px; position: relative;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
        }
        /* הפס הזהוב מהתמונה */
        .main-card::after {
            content: ''; position: absolute; top: 0; right: 0; width: 5px; height: 100%;
            background: var(--gold); box-shadow: 0 0 25px var(--gold);
        }

        .stats-grid { 
            display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 50px; 
        }
        .stat-box { 
            flex: 1; min-width: 250px; background: #050505; border: 1px solid #111; 
            padding: 40px 20px; text-align: center; display: flex; flex-direction: column; justify-content: center;
        }
        .stat-box label { 
            font-size: 11px; color: var(--gold); letter-spacing: 5px; 
            margin-bottom: 20px; text-transform: uppercase; font-weight: 600; display: block;
        }
        .stat-box .amount { 
            font-size: 34px; font-weight: 200; color: #ffffff; letter-spacing: 1px;
        }

        .chart-placeholder { height: 380px; width: 100%; position: relative; margin-top: 40px; }

        /* שער כניסה - תיקון באג לחיצה */
        .auth-gate { 
            max-width: 450px; margin: 100px auto; text-align: center; 
            position: relative; z-index: 2500; /* חייב להיות גבוה יותר משכבות הרקע */
        }
        .auth-gate input { 
            width: 100%; padding: 25px; background: transparent; border: none; 
            border-bottom: 2px solid #222; color: #fff; font-size: 28px; 
            text-align: center; margin-bottom: 50px; pointer-events: all;
        }

        @media (max-width: 1200px) {
            .dashboard-wrapper { grid-template-columns: 1fr; }
            .stats-grid { flex-direction: column; }
            nav.main-nav { top: auto; bottom: 0; right: 0; left: 0; transform: none; flex-direction: row; width: 100%; height: 85px; background: #000; border-top: 1px solid var(--gold); }
            .nav-item { border-radius: 0; border: none; width: 25%; flex-direction: column; justify-content: center; padding: 0; }
            .nav-item span { opacity: 1; font-size: 10px; margin: 8px 0 0; }
        }
    </style>
</head>
<body>

<div id="particles-js"></div>

<header>
    <div class="logo" onclick="switchPage('home')">ELDOR <span>GROUP</span></div>
    <button class="btn-portal-access" onclick="switchPage('vault')">CLIENT LOGIN</button>
</header>

<nav class="main-nav">
    <div class="nav-item" onclick="switchPage('about')"><i class="fa-solid fa-landmark"></i><span>אודות</span></div>
    <div class="nav-item" onclick="switchPage('routes')"><i class="fa-solid fa-gem"></i><span>מסלולים</span></div>
    <div class="nav-item" onclick="switchPage('faq')"><i class="fa-solid fa-shield-halved"></i><span>ביטחונות</span></div>
    <div class="nav-item" onclick="switchPage('contact')"><i class="fa-solid fa-envelope"></i><span>צור קשר</span></div>
</nav>

<div id="home-page" class="page-content active" style="display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;">
    <h1 style="font-family: 'Cinzel'; font-size: clamp(55px, 16vw, 140px); letter-spacing: 35px; font-weight: 100; margin: 0;">ELDOR</h1>
    <div style="width: 80px; height: 1px; background: var(--gold); margin: 40px auto;"></div>
    <p style="color: var(--gold); letter-spacing: 18px; margin-top: 20px; font-weight: 300; font-size: 13px;">WEALTH REIMAGINED</p>
</div>

<div id="vault-page" class="page-content">
    <div id="login-form" class="auth-gate">
        <h2 style="font-family:'Cinzel'; letter-spacing: 10px; margin-bottom: 60px; font-weight: 400;">IDENTIFICATION</h2>
        <input type="tel" id="phoneNumber" placeholder="05XXXXXXXX">
        <button class="btn-portal-access" style="position: static; width: 100%; padding: 25px; background: var(--gold); color: #000;" onclick="handleLogin()">ACCESS VAULT</button>
    </div>

    <div id="personal-dashboard" class="dashboard-wrapper" style="display: none;">
        <div class="main-card">
            <h2 style="font-family:'Cinzel'; font-weight: 400; margin-bottom: 50px; letter-spacing: 5px;">PORTFOLIO <span style="color: var(--gold)">STATUS</span></h2>
            
            <div class="stats-grid">
                <div class="stat-box">
                    <label>שווי תיק נוכחי</label>
                    <div class="amount">₪1,450,230</div>
                </div>
                <div class="stat-box">
                    <label>תשואה מצטברת</label>
                    <div class="amount" style="color: #00ffaa;">+12.42%</div>
                </div>
                <div class="stat-box">
                    <label>רווח נקי (₪)</label>
                    <div class="amount">₪136,580</div>
                </div>
            </div>

            <div class="chart-placeholder">
                <svg viewBox="0 0 1000 350" preserveAspectRatio="none" style="width: 100%; height: 100%;">
                    <defs>
                        <linearGradient id="g" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" stop-color="var(--gold)" stop-opacity="0.3" />
                            <stop offset="100%" stop-color="transparent" stop-opacity="0" />
                        </linearGradient>
                    </defs>
                    <path d="M0,320 Q150,280 300,300 T600,180 T1000,80" fill="none" stroke="var(--gold)" stroke-width="5" stroke-linecap="round" />
                    <path d="M0,320 Q150,280 300,300 T600,180 T1000,80 L1000,350 L0,350 Z" fill="url(#g)" />
                </svg>
            </div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 25px;">
            <div class="main-card" style="padding: 35px;">
                <h4 style="color: var(--gold); letter-spacing: 4px; margin-bottom: 30px;">SERVICE HUB</h4>
                <p style="font-size: 14px; color: #888; margin-bottom: 12px;">• דוח רבעוני - 2026</p>
                <p style="font-size: 14px; color: #888; margin-bottom: 25px;">• סטטוס בטוחות: פעיל</p>
                <button class="btn-portal-access" style="position: static; width: 100%; border-color: #333; color: #fff;">DOCUMENTS</button>
            </div>
            <button class="btn-portal-access" style="position: static; width: 100%; background: #300; color: #fff; border: none;" onclick="handleLogout()">LOGOUT</button>
        </div>
    </div>
</div>

<div id="about-page" class="page-content"><h1 style="text-align:center; color:var(--gold); font-family:'Cinzel';">ABOUT ELDOR</h1></div>
<div id="routes-page" class="page-content"><h1 style="text-align:center; color:var(--gold); font-family:'Cinzel';">STRATEGIES</h1></div>
<div id="faq-page" class="page-content"><h1 style="text-align:center; color:var(--gold); font-family:'Cinzel';">SECURITY</h1></div>
<div id="contact-page" class="page-content"><h1 style="text-align:center; color:var(--gold); font-family:'Cinzel';">CONTACT</h1></div>

<script>
    function switchPage(id) {
        document.querySelectorAll('.page-content').forEach(p => {
            p.classList.remove('active');
            p.style.display = 'none';
        });
        const target = document.getElementById(id + '-page');
        if (target) {
            target.style.display = (id === 'home') ? 'flex' : 'block';
            setTimeout(() => target.classList.add('active'), 50);
        }
        localStorage.setItem('eldor_last_view', id);
    }

    function handleLogin() {
        const p = document.getElementById('phoneNumber').value;
        if (p.length >= 9) {
            localStorage.setItem('eldor_session', 'active');
            showDashboard();
        } else {
            alert('מספר טלפון אינו תקין');
        }
    }

    function showDashboard() {
        document.getElementById('login-form').style.display = 'none';
        const dash = document.getElementById('personal-dashboard');
        dash.style.display = (window.innerWidth > 1200) ? 'grid' : 'flex';
        dash.style.flexDirection = 'column';
    }

    function handleLogout() {
        localStorage.clear();
        location.reload();
    }

    window.onload = function() {
        if (localStorage.getItem('eldor_session') === 'active') showDashboard();
        const last = localStorage.getItem('eldor_last_view') || 'home';
        switchPage(last);

        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 85 },
                "color": { "value": "#c5a059" },
                "opacity": { "value": 0.4 },
                "size": { "value": 1.5 },
                "line_linked": { "enable": true, "distance": 150, "color": "#c5a059", "opacity": 0.1 },
                "move": { "enable": true, "speed": 1 }
            }
        });
    };
</script>
</body>
</html>
