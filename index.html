<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELDOR GROUP | Wealth Management</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@100;300;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>
    
    <style>
        :root { 
            --gold: #c5a059; 
            --bg: #000000;
            --card-bg: #0a0a0a;
            --border: rgba(197, 160, 89, 0.2);
        }

        /* מניעת פריצת רזולוציה ויישור RTL */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        ::-webkit-scrollbar { display: none; }
        
        body, html { 
            background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; 
            height: 100dvh; width: 100vw; overflow: hidden; position: fixed;
            direction: rtl;
        }

        #particles-js { position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.3; }

        /* HEADER - מהודק */
        header {
            position: fixed; top: 0; width: 100%; height: 80px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 5000; padding: 0 5%; background: rgba(0,0,0,0.95);
            border-bottom: 1px solid var(--border);
        }
        .logo { font-family: 'Cinzel', serif; font-size: 24px; letter-spacing: 6px; color: #fff; text-decoration: none; }
        .logo span { color: var(--gold); font-weight: 700; }

        /* ניווט צד ימני מהודק */
        nav.side-nav {
            position: fixed; right: 0; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 10px; z-index: 6000;
        }
        .nav-item {
            background: var(--card-bg); border: 1px solid var(--border);
            height: 50px; width: 50px; border-radius: 25px 0 0 25px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s;
        }
        .nav-item i { color: var(--gold); font-size: 18px; }
        .nav-item:hover { background: var(--gold); }
        .nav-item:hover i { color: #000; }

        /* קונטיינר מרכזי מוגבל רזולוציה - התיקון הסופי */
        .app-container {
            max-width: 1100px; margin: 0 auto; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            position: relative; z-index: 100;
        }

        .view { display: none; width: 100%; padding: 0 20px; }
        .view.active { display: flex; flex-direction: column; animation: fadeIn 0.6s ease; }

        /* אזור אישי יוקרתי - THE VAULT */
        .vault-card {
            width: 100%; max-width: 380px; background: #050505;
            padding: 50px 40px; border: 1px solid var(--border);
            text-align: right; border-top: 4px solid var(--gold);
            box-shadow: 0 50px 100px rgba(0,0,0,0.9); margin: 0 auto;
        }
        .vault-card h2 { font-family: 'Cinzel'; text-align: center; margin-bottom: 40px; letter-spacing: 5px; font-weight: 400; color: #fff; }
        
        .field { margin-bottom: 30px; }
        .field label { font-size: 10px; color: var(--gold); letter-spacing: 2px; display: block; margin-bottom: 10px; text-transform: uppercase; }
        .field input { 
            width: 100%; padding: 12px 0; background: transparent; 
            border: none; border-bottom: 1px solid #222; color: #fff; 
            font-size: 18px; transition: 0.3s; outline: none;
        }
        .field input:focus { border-bottom-color: var(--gold); }

        .btn-gold {
            background: var(--gold); color: #000; border: none; width: 100%;
            padding: 18px; font-weight: 800; font-size: 12px; letter-spacing: 3px;
            cursor: pointer; transition: 0.3s; text-transform: uppercase;
        }
        .btn-gold:hover { filter: brightness(1.2); transform: translateY(-2px); }

        /* דשבורד לקוח - נקי ומהודק */
        .dashboard { 
            display: grid; grid-template-columns: 1fr 300px; gap: 20px; width: 100%;
        }
        .panel { background: var(--card-bg); border: 1px solid var(--border); padding: 40px; height: auto; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 30px; }
        .stat-box { background: #000; border: 1px solid #111; padding: 30px 20px; text-align: center; }
        .stat-box label { font-size: 9px; color: var(--gold); display: block; margin-bottom: 15px; letter-spacing: 2px; }
        .stat-box div { font-size: 24px; font-weight: 100; }

        /* TICKER - המלל המדויק */
        .ticker-bar {
            position: fixed; bottom: 0; width: 100%; height: 40px;
            background: #000; border-top: 1px solid #111;
            z-index: 9000; display: flex; align-items: center; overflow: hidden;
        }
        .ticker-wrap { display: flex; white-space: nowrap; animation: ticker-scroll 35s linear infinite; }
        .ticker-unit { padding: 0 40px; font-size: 11px; font-weight: 700; letter-spacing: 1px; }
        .ticker-unit b { color: var(--gold); margin-left: 5px; }

        @keyframes ticker-scroll { from { transform: translateX(0); } to { transform: translateX(100%); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* MOBILE OPTIMIZATION */
        @media (max-width: 900px) {
            .dashboard { grid-template-columns: 1fr; }
            nav.side-nav { 
                top: auto; bottom: 0; right: 0; left: 0; transform: none; 
                flex-direction: row; width: 100%; height: 70px; background: #000; border-top: 1px solid var(--gold);
            }
            .nav-item { width: 33.33%; border-radius: 0; border: none; height: 100%; }
            .ticker-bar { bottom: 70px; }
            .app-container { padding-top: 100px; padding-bottom: 160px; align-items: flex-start; }
            .logo { font-size: 18px; }
        }
    </style>
</head>
<body>

<div id="particles-js"></div>

<header>
    <a href="#" class="logo" onclick="goTo('home')">ELDOR <span>GROUP</span></a>
    <div style="font-size: 9px; color: #444; letter-spacing: 3px;">PRIVATE VAULT v5.0</div>
</header>

<nav class="side-nav">
    <div class="nav-item" onclick="goTo('vault')"><i class="fa-solid fa-key"></i></div>
    <div class="nav-item" onclick="goTo('home')"><i class="fa-solid fa-house"></i></div>
    <div class="nav-item" onclick="goTo('contact')"><i class="fa-solid fa-comment-dots"></i></div>
</nav>

<div class="app-container">
    <div id="home-view" class="view active" style="text-align: center;">
        <h1 style="font-family:'Cinzel'; font-size: clamp(35px, 8vw, 100px); letter-spacing: 18px; font-weight: 100;">ELDOR</h1>
        <p style="color: var(--gold); letter-spacing: 10px; margin-top: 20px; font-size: 13px;">WEALTH ARCHITECTURE</p>
    </div>

    <div id="vault-view" class="view">
        <div id="auth-screen" class="vault-card">
            <h2>PRIVATE LOGIN</h2>
            <div class="field">
                <label>מספר טלפון</label>
                <input type="tel" id="tel_val" placeholder="05X-XXXXXXX">
            </div>
            <div class="field">
                <label>קוד גישה</label>
                <input type="password" id="pin_val" placeholder="****">
            </div>
            <button class="btn-gold" onclick="unlock()">כניסה לכספת</button>
        </div>

        <div id="client-dashboard" class="dashboard" style="display: none;">
            <div class="panel">
                <h3 style="font-family:'Cinzel'; color: var(--gold); margin-bottom: 25px;">סיכום נכסים</h3>
                <div class="stats-grid">
                    <div class="stat-box"><label>סה"כ הון</label><div>₪1,450,230</div></div>
                    <div class="stat-box"><label>תשואה שנתית</label><div style="color: #00ffaa;">+12.42%</div></div>
                </div>
                <div style="margin-top: 40px; height: 160px; border-bottom: 1px solid var(--gold);">
                    <svg viewBox="0 0 1000 160" preserveAspectRatio="none" style="width:100%; height:100%;">
                        <path d="M0,140 Q150,120 300,130 T600,60 T1000,20" fill="none" stroke="var(--gold)" stroke-width="2" />
                    </svg>
                </div>
            </div>
            <div class="panel" style="background: #000;">
                <h4 style="font-size: 10px; color: var(--gold); letter-spacing: 2px;">הודעות אחרונות</h4>
                <div style="margin-top: 25px; font-size: 12px; color: #555; line-height: 2.5;">
                    • עדכון רבעוני Q1 מוכן לצפייה<br>
                    • בוצעה התאמת סיכונים במגזר השבבים<br>
                    • נכסי נדל"ן עודכנו במערכת
                </div>
                <button class="btn-gold" style="background: #1a0000; color: #fff; margin-top: 50px; border: 1px solid #300;" onclick="location.reload()">התנתקות מאובטחת</button>
            </div>
        </div>
    </div>

    <div id="contact-view" class="view" style="text-align: center;">
        <h2 style="font-family:'Cinzel'; color: var(--gold);">צור קשר</h2>
    </div>
</div>

<div class="ticker-bar">
    <div class="ticker-wrap" id="ticker-api"></div>
</div>

<script>
    function goTo(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id + '-view').classList.add('active');
    }

    function unlock() {
        if(document.getElementById('tel_val').value.length > 5) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('client-dashboard').style.display = (window.innerWidth > 900) ? 'grid' : 'flex';
            document.getElementById('client-dashboard').style.flexDirection = 'column';
        }
    }

    const market = [
        {n: "ת\"א 35", v: "2,145", c: "+0.45%"},
        {n: "מדד הבנקים", v: "3,890", c: "-0.22%"},
        {n: "SOXS", v: "32.14", c: "-4.20%"},
        {n: "GOLD", v: "2,150", c: "+0.88%"},
        {n: "S&P 500", v: "5,123", c: "+0.15%"},
        {n: "ELDOR STRATEGY", v: "142.0", c: "+1.12%"}
    ];

    window.onload = function() {
        const wrap = document.getElementById('ticker-api');
        const html = market.map(s => `<div class="ticker-unit"><b>${s.n}</b> ${s.v} <span style="color:${s.c.includes('-')?'#ff4444':'#00ffaa'}">${s.c}</span></div>`).join('');
        wrap.innerHTML = html + html;

        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 50 },
                "color": { "value": "#c5a059" },
                "size": { "value": 1 },
                "line_linked": { "enable": true, "distance": 150, "color": "#c5a059", "opacity": 0.1 },
                "move": { "enable": true, "speed": 1 }
            }
        });
    };
</script>
</body>
</html>
