<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELDOR GROUP | Portfolio Management</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>
    
    <style>
        :root { 
            --gold: #c5a059; --gold-bright: #f1d5a2; --bg: #050505; --card: #0c0c0c;
            --txt: #ffffff; --txt-dim: #a0a0a0; --success: #00ff88;
            --trans: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { display: none; }
        
        body, html { 
            margin: 0; padding: 0; background: var(--bg); color: var(--txt); 
            font-family: 'Inter', 'Segoe UI', Tahoma, sans-serif; 
            height: 100vh; width: 100vw; overflow: hidden;
        }

        /* --- BACKGROUND ELEMENTS --- */
        #particles-js { position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.25; }
        .ambient-glow { position: fixed; inset: 0; z-index: 2; background: radial-gradient(circle at 50% 15%, rgba(197, 160, 89, 0.08) 0%, transparent 70%); pointer-events: none; }

        /* --- HEADER & NAVIGATION --- */
        header {
            position: fixed; top: 0; width: 100%; height: 90px;
            display: flex; justify-content: center; align-items: center;
            z-index: 10000; background: linear-gradient(to bottom, rgba(0,0,0,0.95), transparent);
        }
        .logo { font-size: 20px; letter-spacing: 10px; font-weight: 100; cursor: pointer; color: #fff; text-decoration: none; }
        .logo span { color: var(--gold); font-weight: 800; }

        .btn-portal-access {
            position: absolute; left: 5%; top: 25px;
            background: rgba(15,15,15,0.8); border: 1px solid var(--gold); color: var(--gold);
            padding: 12px 28px; font-size: 10px; letter-spacing: 2px; font-weight: 700;
            cursor: pointer; transition: var(--trans); backdrop-filter: blur(10px);
        }
        .btn-portal-access:hover { background: var(--gold); color: #000; box-shadow: 0 0 30px rgba(197,160,89,0.4); }

        /* --- SIDE NAVIGATION (FIXED & STABLE) --- */
        nav.main-nav {
            position: fixed; right: 0; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 15px; z-index: 10001;
        }
        .nav-link {
            background: rgba(10, 10, 10, 0.95); border: 1px solid rgba(197, 160, 89, 0.15);
            height: 60px; width: 60px; border-radius: 30px 0 0 30px; cursor: pointer;
            display: flex; align-items: center; overflow: hidden; padding-right: 22px;
            transition: var(--trans);
        }
        .nav-link i { color: var(--gold); font-size: 1.2rem; min-width: 25px; }
        .nav-link span { 
            opacity: 0; margin-right: 25px; font-size: 14px; white-space: nowrap; 
            color: #fff; font-weight: 300; transform: translateX(20px); transition: 0.3s ease;
        }
        .nav-link:hover { width: 220px; border-color: var(--gold); background: #000; }
        .nav-link:hover span { opacity: 1; transform: translateX(0); }

        @media (max-width: 768px) {
            nav.main-nav { top: auto; bottom: 0; right: 0; left: 0; transform: none; flex-direction: row; justify-content: space-around; width: 100%; height: 85px; background: #080808; border-top: 1px solid #1a1a1a; padding: 10px; }
            .nav-link { border-radius: 12px; width: auto; height: auto; border: none; flex-direction: column; padding: 0; background: transparent; }
            .nav-link span { opacity: 1; font-size: 10px; margin-top: 8px; transform: none; }
            .btn-portal-access { left: auto; right: 5%; }
        }

        /* --- VIEW CONTROLLER --- */
        .page-view { position: fixed; inset: 0; z-index: 4000; display: none; padding: 120px 6% 100px; overflow-y: auto; background: var(--bg); }
        .page-view.active { display: block; animation: viewFadeIn 0.8s ease forwards; }
        @keyframes viewFadeIn { from { opacity: 0; transform: scale(1.01); } to { opacity: 1; transform: scale(1); } }

        /* --- DASHBOARD (THE VAULT - PHOTO REPLICA) --- */
        .vault-grid { max-width: 1450px; margin: 0 auto; display: grid; grid-template-columns: 1fr 350px; gap: 30px; }
        
        .card-premium { 
            background: var(--card); border: 1px solid #151515; padding: 40px; 
            border-radius: 4px; position: relative; overflow: visible;
        }
        /* הפס המוזהב מהתמונה - דיוק מקסימלי */
        .gold-border-right {
            position: absolute; top: 0; right: -1px; width: 3px; height: 100%;
            background: var(--gold); box-shadow: 0 0 20px rgba(197, 160, 89, 0.6); z-index: 10;
        }

        .summary-stats { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 45px; }
        .stat-card { flex: 1; min-width: 180px; background: #050505; border: 1px solid #111; padding: 25px; text-align: center; }
        .stat-card label { font-size: 9px; color: #555; text-transform: uppercase; letter-spacing: 3px; display: block; margin-bottom: 12px; }
        .stat-card .value { font-size: 24px; font-weight: 200; color: #fff; }

        .performance-graph { height: 300px; width: 100%; position: relative; margin-top: 30px; }
        .graph-svg { width: 100%; height: 100%; }

        .side-info { display: flex; flex-direction: column; gap: 20px; }
        .widget { background: #080808; border: 1px solid #151515; padding: 25px; border-radius: 4px; }
        .widget h4 { color: var(--gold); margin: 0 0 20px; font-weight: 400; letter-spacing: 2px; border-bottom: 1px solid #111; padding-bottom: 10px; }

        .btn-gold-action { 
            width: 100%; padding: 18px; background: var(--gold); color: #000; 
            border: none; font-size: 11px; font-weight: 800; letter-spacing: 4px; 
            cursor: pointer; transition: 0.3s;
        }
        .btn-gold-action:hover { background: #fff; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }

        /* --- TICKER --- */
        .market-ticker {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 40px;
            background: #000; border-top: 1px solid #111; z-index: 8000;
            display: flex; align-items: center; overflow: hidden;
        }
        @media (max-width: 768px) { .market-ticker { bottom: 85px; } }
        .ticker-move { display: flex; gap: 60px; animation: tickerScroll 40s infinite linear; white-space: nowrap; padding-left: 100%; font-size: 11px; color: #666; }
        @keyframes tickerScroll { from { transform: translateX(0); } to { transform: translateX(-100%); } }
        .ticker-move b { color: var(--gold); }

        @media (max-width: 1100px) { .vault-grid { grid-template-columns: 1fr; } .summary-stats { flex-direction: column; } }
    </style>
</head>
<body>

<div id="particles-js"></div>
<div class="ambient-glow"></div>

<header>
    <div class="logo" onclick="navigateTo('home')">ELDOR <span>GROUP</span></div>
    <button class="btn-portal-access" onclick="navigateTo('vault')">CLIENT LOGIN</button>
</header>

<nav class="main-nav">
    <div class="nav-link" onclick="navigateTo('about')"><i class="fa-solid fa-landmark-dome"></i><span>מי אנחנו</span></div>
    <div class="nav-link" onclick="navigateTo('routes')"><i class="fa-solid fa-chart-pie"></i><span>מסלולי השקעה</span></div>
    <div class="nav-link" onclick="navigateTo('security')"><i class="fa-solid fa-shield-halved"></i><span>ביטחונות</span></div>
    <div class="nav-link" onclick="navigateTo('contact')"><i class="fa-solid fa-paper-plane"></i><span>צור קשר</span></div>
</nav>

<div id="home-view" class="page-view active" style="display: flex; align-items: center; justify-content: center; text-align: center;">
    <div>
        <h1 style="font-size: clamp(40px, 11vw, 100px); font-weight: 100; letter-spacing: 25px; margin: 0; opacity: 0.9;">ELDOR</h1>
        <p style="color:var(--gold); letter-spacing:15px; font-size:11px; margin-top:35px; font-weight:300;">THE ARCHITECTURE OF WEALTH</p>
    </div>
    <div class="market-ticker">
        <div class="ticker-move">
            <span><b>S&P 500:</b> 5,123.45 (+1.1%)</span>
            <span><b>NASDAQ:</b> 16,274.90 (+0.8%)</span>
            <span><b>GOLD:</b> $2,380.10 (+1.9%)</span>
            <span><b>ELDOR ALPHA:</b> +14.82%</span>
            <span><b>CRUDE OIL:</b> $85.40 (-0.4%)</span>
        </div>
    </div>
</div>

<div id="vault-view" class="page-view">
    <div id="login-screen" style="max-width:380px; margin: 80px auto; text-align: center;">
        <h3 style="font-weight:100; letter-spacing:6px; margin-bottom:40px;">SECURE ACCESS</h3>
        <input type="tel" id="userPhone" style="width:100%; padding:20px; background:transparent; border:none; border-bottom:2px solid #222; color:#fff; text-align:center; font-size:26px; margin-bottom:50px; letter-spacing:5px;" placeholder="05XXXXXXXX">
        <button class="btn-gold-action" onclick="handleLogin()">VERIFY & ENTER</button>
    </div>

    <div id="dashboard-ui" style="display:none">
        <div class="vault-grid">
            <div class="card-premium">
                <div class="gold-border-right"></div>
                <h2 style="font-weight:100; margin:0 0 45px; letter-spacing:3px;">PORTFOLIO <span style="color:var(--gold)">LIVE</span></h2>
                
                <div class="summary-stats">
                    <div class="stat-card"><label>שווי נוכחי</label><div class="value">₪1,450,230</div></div>
                    <div class="stat-card"><label>תשואה</label><div class="value" style="color:var(--success)">+12.42%</div></div>
                    <div class="stat-card"><label>רווח נקי</label><div class="value">₪136,580</div></div>
                </div>
                
                <div class="performance-graph">
