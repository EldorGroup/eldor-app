<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELDOR GROUP | Premium Banking Experience</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>
    
    <style>
        :root { 
            --gold: #c5a059; --gold-glow: rgba(197, 160, 89, 0.5); --bg: #020202; 
            --card: #080808; --txt: #ffffff; --success: #2ecc71;
            --trans: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }
        
        * { box-sizing: border-box; outline: none; }
        ::-webkit-scrollbar { display: none; }
        
        body, html { 
            margin: 0; padding: 0; background: var(--bg); color: var(--txt); 
            font-family: 'Inter', system-ui, sans-serif; height: 100vh; overflow: hidden;
        }

        /* --- רקע ואווירה (V40) --- */
        #particles-js { position: fixed; inset: 0; z-index: 1; opacity: 0.3; }
        .overlay { position: fixed; inset: 0; background: radial-gradient(circle at 50% 0%, rgba(197,160,89,0.05) 0%, transparent 75%); z-index: 2; pointer-events: none; }

        /* --- לוגו וניווט (V40) --- */
        header {
            position: fixed; top: 0; width: 100%; height: 80px;
            display: flex; justify-content: center; align-items: center;
            z-index: 9000; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }
        .logo { font-size: 18px; letter-spacing: 7px; font-weight: 100; color: #fff; cursor: pointer; }
        .logo span { color: var(--gold); font-weight: 700; }

        .btn-portal {
            position: absolute; left: 5%; top: 25px;
            border: 1px solid var(--gold); color: var(--gold); background: transparent;
            padding: 8px 18px; font-size: 10px; letter-spacing: 2px; cursor: pointer; transition: var(--trans);
        }
        .btn-portal:hover { background: var(--gold); color: #000; box-shadow: 0 0 20px var(--gold-glow); }

        /* --- תפריט צד (V40) --- */
        nav.side-menu {
            position: fixed; right: 0; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 12px; z-index: 8500;
        }
        .nav-item {
            background: rgba(10,10,10,0.9); border: 1px solid rgba(197,160,89,0.1);
            height: 45px; width: 45px; border-radius: 22px 0 0 22px; cursor: pointer;
            display: flex; align-items: center; overflow: hidden; padding-right: 15px; transition: var(--trans);
        }
        .nav-item i { color: var(--gold); font-size: 1rem; min-width: 18px; }
        .nav-item span { opacity: 0; margin-right: 15px; font-size: 12px; white-space: nowrap; }
        .nav-item:hover { width: 160px; border-color: var(--gold); }
        .nav-item:hover span { opacity: 1; }

        /* --- VIEW SYSTEM --- */
        .view { position: fixed; inset: 0; z-index: 4000; display: none; padding: 100px 5% 40px; overflow-y: auto; background: var(--bg); }
        .view.active { display: block; animation: fadeIn 0.6s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- DASHBOARD (השדרוג לפי התמונות) --- */
        .dash-container { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; max-width: 1400px; margin: 0 auto; }
        .card { background: var(--card); border: 1px solid #1a1a1a; padding: 25px; border-radius: 12px; position: relative; }
        
        /* כותרות סגנון תמונה */
        .card-title { font-size: 10px; color: #666; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 15px; display: block; }
        .card-val { font-size: 28px; font-weight: 200; color: #fff; }
        .card-val.green { color: var(--success); }

        /* גרף משודרג (Dynamic Area Chart מתוך התמונה) */
        .chart-box { height: 220px; width: 100%; margin-top: 20px; position: relative; }
        .chart-svg { width: 100%; height: 100%; filter: drop-shadow(0 0 5px var(--gold-glow)); }
        
        /* גלובוס (Global Map מתוך התמונה) */
        .globe-box { 
            height: 220px; width: 100%; margin-top: 20px;
            background: url('https://upload.wikimedia.org/wikipedia/commons/e/e4/LatLong_Empty_World_Map.svg') no-repeat center;
            background-size: contain; opacity: 0.6; position: relative;
        }
        .globe-overlay {
            position: absolute; inset: 0;
            background: radial-gradient(circle, transparent 40%, var(--bg) 100%);
        }
        .map-point {
            position: absolute; width: 8px; height: 8px; background: var(--gold);
            border-radius: 50%; box-shadow: 0 0 10px var(--gold);
        }

        /* --- AUTH --- */
        .auth-box { max-width: 350px; margin: 100px auto; text-align: center; }
        .auth-input { 
            width: 100%; padding: 15px; background: transparent; border: none; 
            border-bottom: 1px solid #333; color: #fff; font-size: 20px; 
            text-align: center; margin-bottom: 30px; letter-spacing: 5px;
        }
    </style>
</head>
<body>

<div id="particles-js"></div>
<div class="overlay"></div>

<header>
    <div class="logo" onclick="navTo('home')">ELDOR <span>GROUP</span></div>
    <button class="btn-portal" onclick="navTo('vault')">AREA</button>
</header>

<nav class="side-menu">
    <div class="nav-item" onclick="navTo('about')"><i class="fa-solid fa-landmark"></i><span>הקבוצה</span></div>
    <div class="nav-item" onclick="navTo('routes')"><i class="fa-solid fa-chart-pie"></i><span>מסלולים</span></div>
    <div class="nav-item" onclick="navTo('faq')"><i class="fa-solid fa-shield-check"></i><span>ביטחונות</span></div>
    <div class="nav-item" onclick="navTo('contact')"><i class="fa-solid fa-paper-plane"></i><span>צור קשר</span></div>
</nav>

<div id="home-view" class="view active" style="display: flex; align-items: center; justify-content: center; text-align: center; flex-direction: column;">
    <h1 style="font-size: 80px; font-weight: 100; letter-spacing: 20px; margin: 0;">ELDOR</h1>
    <p style="color: var(--gold); letter-spacing: 10px; font-size: 12px; margin-top: 20px;">PREMIUM WEALTH STRATEGY</p>
</div>

<div id="vault-view" class="view">
    <div id="auth-gate" class="auth-box">
        <h2 style="font-weight: 100; letter-spacing: 3px;">IDENTIFICATION</h2>
        <input type="tel" id="telIn" class="auth-input" placeholder="05XXXXXXXX">
        <button class="btn-portal" style="position:static; width:100%" onclick="unlock()">ENTER VAULT</button>
    </div>

    <div id="dash-content" style="display:none">
        <h2 style="font-weight: 100; margin-bottom: 40px; text-align: center;">סקירת תיק השקעות - <span style="color:var(--gold)">דור אליאור</span></h2>
        
        <div class="dash-container">
            <div class="card">
                <span class="card-title">סה"כ שווי התיק</span>
                <div class="card-val">₪1,854,200</div>
                <div style="margin-top: 20px; height: 100px; display: flex; align-items: flex-end; gap: 5px;">
                    <div style="flex:1; background: #111; height: 40%;"></div>
                    <div style="flex:1; background: #111; height: 60%;"></div>
                    <div style="flex:1; background: var(--gold); height: 80%;"></div>
                    <div style="flex:1; background: #111; height: 50%;"></div>
                </div>
            </div>

            <div class="card">
                <span class="card-title">ביצועי תיק vs. מדדים</span>
                <div class="card-val green">+14.8%</div>
                <div class="chart-box">
                    <svg class="chart-svg" viewBox="0 0 100 40">
                        <path d="M0,35 Q15,30 25,32 T45,20 T70,25 T100,5" fill="none" stroke="rgba(197,160,89,0.1)" stroke-width="0.5"/>
                        <path d="M0,38 Q15,33 25,35 T45,23 T70,28 T100,8" fill="none" stroke="rgba(197,160,89,0.2)" stroke-width="0.5"/>
                        <path d="M0,40 Q15,35 25,37 T45,25 T70,30 T100,10" fill="none" stroke="var(--gold)" stroke-width="1" />
                        <path d="M0,40 Q15,35 25,37 T45,25 T70,30 T100,10 L100,40 L0,40 Z" fill="linear-gradient(to bottom, var(--gold-glow), transparent)" opacity="0.1"/>
                    </svg>
                </div>
            </div>

            <div class="card">
                <span class="card-title">איפה הקרן משקיעה כעת</span>
                <div class="globe-box">
                    <div class="globe-overlay"></div>
                    <div class="map-point" style="top: 45%; left: 52%;" title="Europe"></div>
                    <div class="map-point" style="top: 40%; left: 25%;" title="USA"></div>
                    <div class="map-point" style="top: 50%; left: 65%;" title="Israel"></div>
                </div>
                <div style="font-size: 11px; color: #555; text-align: center; margin-top: 10px;">נכסים מבוזרים ב-3 יבשות</div>
            </div>
        </div>

        <div style="text-align: center; margin-top: 50px;">
            <button class="btn-portal" style="position:static" onclick="location.reload()">ניתוק מאובטח</button>
        </div>
    </div>
</div>

<script>
    function navTo(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id + '-view').classList.add('active');
    }

    function unlock() {
        const tel = document.getElementById('telIn').value;
        if(tel.length > 5) {
            document.getElementById('auth-gate').style.display = 'none';
            document.getElementById('dash-content').style.display = 'block';
        }
    }

    particlesJS("particles-js", {
        "particles": {
            "number": { "value": 50 },
            "color": { "value": "#c5a059" },
            "shape": { "type": "circle" },
            "opacity": { "value": 0.5 },
            "size": { "value": 1.5 },
            "line_linked": { "enable": true, "distance": 150, "color": "#c5a059", "opacity": 0.1 },
            "move": { "enable": true, "speed": 1 }
        }
    });
</script>

</body>
</html>
