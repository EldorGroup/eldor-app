<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#020617">
    <title>ELDOR GROUP | Asset Management Terminal</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --bg: #020617;
            --panel: rgba(15, 23, 42, 0.6);
            --gold: #c5a059;
            --gold-bright: #f1d392;
            --gold-gradient: linear-gradient(135deg, #c5a059 0%, #f1d392 50%, #c5a059 100%);
            --border: rgba(197, 160, 89, 0.2);
            --text-main: #f8fafc;
            --success: #22c55e;
            --danger: #ef4444;
            --text-scale: 1;
            
            --color-tech: #f1d392;
            --color-def: #c5a059;
            --color-liq: #475569;
        }

        body.high-contrast {
            --bg: #000000; --panel: #000000; --border: #ffffff; --gold: #ffffff; --gold-bright: #ffffff;
            --text-main: #ffffff; --color-tech: #cccccc; --color-def: #ffffff; --color-liq: #888888;
        }

        html, body { overscroll-behavior-y: none; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        *::-webkit-scrollbar { display: none; }
        
        body { 
            background: var(--bg); color: var(--text-main); font-family: 'Heebo', sans-serif; 
            font-size: calc(15px * var(--text-scale)); 
            height: 100vh; /* נעילה לדף אחד */
            width: 100vw; 
            overflow: hidden; /* מניעת גלילה חיצונית */
            display: flex; flex-direction: column; position: relative; 
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        #algo-bg { position: fixed; inset: 0; z-index: -1; opacity: 0.15; pointer-events: none; }
        body.privacy-mode .sensitive-data { filter: blur(8px); opacity: 0.6; transition: 0.3s ease; user-select: none; }
        .sensitive-data { transition: 0.3s ease; display: inline-block; }

        #top-loader { position: fixed; top: 0; left: 0; height: 3px; width: 0; background: var(--gold-gradient); z-index: 10000; transition: width 0.3s; }
        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: rgba(15, 23, 42, 0.95); border: 1px solid var(--gold); color: var(--gold-bright); padding: 12px 25px; border-radius: 30px; font-weight: 800; z-index: 10001; transition: 0.4s; opacity: 0; display: flex; align-items: center; gap: 10px; font-size: 14px; }
        #toast.show { top: 20px; opacity: 1; }

        /* קונטיינר האפליקציה באזור האישי - נעול לגובה המסך */
        .app-container { display: none; flex-direction: column; flex-grow: 1; width: 100%; max-width: 1400px; margin: 0 auto; padding: 25px 4%; height: calc(100vh - 40px); }
        .app-container.active { display: flex; }

        /* כותרת וכפתורי ניהול מיושרים */
        .dash-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; flex-shrink: 0; }
        .header-titles { display: flex; flex-direction: column; gap: 4px; }
        .header-titles h2 { font-size: 26px; font-weight: 900; line-height: 1; color: var(--text-main); }
        .header-titles h2 span { font-weight: 400; color: #94a3b8; font-size: 20px; }
        .live-clock { font-size: 11px; color: #64748b; font-family: 'Montserrat'; letter-spacing: 1px; }
        
        .header-actions { display: flex; gap: 8px; }
        .btn-action { background: var(--panel); border: 1px solid var(--border); color: #cbd5e1; width: 38px; height: 38px; border-radius: 8px; cursor: pointer; font-size: 14px; display: flex; justify-content: center; align-items: center; transition: all 0.2s; outline: none; }
        .btn-action:hover { border-color: var(--gold-bright); color: var(--gold-bright); background: rgba(197, 160, 89, 0.1); transform: translateY(-2px); }
        .btn-danger { color: var(--danger); border-color: rgba(239, 68, 68, 0.3); }

        /* בר עליון קשיח - CSS Grid מונע דריסות */
        .dash-top-bar {
            display: grid;
            grid-template-columns: auto min-content auto 1fr auto auto;
            align-items: center;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            flex-shrink: 0;
            gap: 20px;
        }
        
        .stat-block { display: flex; flex-direction: column; gap: 4px; }
        .stat-block label { font-size: 12px; color: #94a3b8; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
        .stat-block b { font-family: 'Montserrat', 'Heebo'; font-size: 22px; color: #fff; font-weight: 800; white-space: nowrap; line-height: 1.1; }
        
        .stat-block.primary b { font-size: 36px; }
        
        /* תגית תשואה יושבת בעמודה משלה */
        .yield-badge-wrap { display: flex; align-items: center; padding-top: 15px; }
        .yield-badge { font-family: 'Montserrat'; font-size: 16px; font-weight: 800; padding: 6px 12px; border-radius: 8px; background: rgba(34, 197, 94, 0.15); border: 1px solid rgba(34, 197, 94, 0.3); color: var(--success); white-space: nowrap; }
        .yield-badge.negative { background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3); color: var(--danger); }

        /* מפריד אנכי שקוף במרכז */
        .divider { width: 1px; height: 40px; background: rgba(255,255,255,0.1); margin: 0 10px; }

        /* גריד אזור הנתונים התחתון (65% גרף / 35% פילוח) */
        .data-area { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; flex-grow: 1; min-height: 0; }
        
        .box-panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .box-header { padding: 15px 20px 0; font-size: 12px; color: var(--gold-bright); font-weight: 800; letter-spacing: 1px; text-transform: uppercase; display: flex; justify-content: space-between; z-index: 10; }
        
        /* גרף מדויק */
        .chart-box .svg-container { position: absolute; inset: 0; top: 40px; }
        .chart-svg { width: 100%; height: 100%; preserveAspectRatio: none; }
        .chart-path { fill: none; stroke: url(#grad1); stroke-width: 3; stroke-linejoin: round; stroke-linecap: round; }
        .chart-area { fill: url(#areaGrad); }

        /* פילוח נכסים */
        .allocation-box { padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .donut-wrap { position: relative; width: 140px; height: 140px; margin: 15px 0 25px 0; }
        .donut-svg { transform: rotate(-90deg); width: 100%; height: 100%; }
        .donut-svg circle { fill: transparent; stroke-width: 6; stroke-linecap: round; transition: stroke-dasharray 1s, stroke-dashoffset 1s; }
        .donut-bg { stroke: rgba(255,255,255,0.05); stroke-dasharray: 100 0; }
        .donut-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); border-radius: 50%; width: 108px; height: 108px; margin: auto; box-shadow: inset 0 0 15px rgba(0,0,0,0.8); border: 1px solid var(--border); }
        .donut-center b { font-family: 'Montserrat'; font-size: 24px; font-weight: 800; color: var(--gold-bright); }
        .donut-center span { font-size: 11px; color: #94a3b8; }
        
        .alloc-legend { width: 100%; font-size: 12px; color: #cbd5e1; display: flex; flex-direction: column; gap: 8px; }
        .legend-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; background: rgba(0,0,0,0.3); border-radius: 8px; border: 1px solid rgba(255,255,255,0.02); }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; margin-left: 10px; display: inline-block; }

        /* טיקר תחתון */
        .ticker-wrap { height: 40px; background: #000; border-top: 1px solid var(--border); display: flex; align-items: center; overflow: hidden; position: fixed; bottom: 0; width: 100%; z-index: 2000; }
        .ticker-move { display: flex; white-space: nowrap; animation: scrollTicker 30s linear infinite; }
        .ticker-item { padding: 0 30px; font-family: 'Montserrat'; font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        @keyframes scrollTicker { from { transform: translateX(0); } to { transform: translateX(-50%); } }

    </style>
</head>
<body>

<canvas id="algo-bg"></canvas>
<div id="top-loader"></div>
<div id="toast"><i class="fa-solid fa-info-circle"></i> <span id="toast-msg"></span></div>

<!-- האזור האישי (הדשבורד) -->
<div class="app-container active" id="dashboard-view">
    
    <div class="dash-header">
        <div class="header-titles">
            <h2><span>ערב טוב,</span> דור בן ארויה</h2>
            <div class="live-clock" id="live-clock">--:-- | --.--.----</div>
        </div>
        <div class="header-actions">
            <button class="btn-action btn-danger" onclick="alert('ניתוק')" title="התנתקות"><i class="fa-solid fa-power-off"></i></button>
            <button class="btn-action" onclick="window.print()" title="ייצוא דוח"><i class="fa-solid fa-file-pdf"></i></button>
            <button class="btn-action" onclick="document.body.classList.toggle('privacy-mode')" title="מצב פרטיות"><i class="fa-solid fa-eye-slash"></i></button>
            <button class="btn-action" onclick="location.reload()" title="רענון"><i class="fa-solid fa-arrows-rotate"></i></button>
        </div>
    </div>

    <!-- הבר העליון המדויק (Grid) -->
    <div class="dash-top-bar">
        <div class="stat-block primary">
            <label>שווי נוכחי</label>
            <b id="curr-val" class="sensitive-data">₪250,000</b>
        </div>
        <div class="yield-badge-wrap">
            <span id="yield-val" class="sensitive-data yield-badge">+150%</span>
        </div>
        <div class="stat-block" style="padding-right: 20px;">
            <label>סה"כ הפקדות</label>
            <b class="sensitive-data" id="total-dep">₪100,000</b>
        </div>
        
        <div class="divider"></div>
        
        <div class="stat-block text-center">
            <label>מסלול אישי</label>
            <b id="track-name" style="font-family:'Heebo';">Income</b>
        </div>
        <div class="stat-block text-left" style="text-align: left;">
            <label>תחילת פעילות</label>
            <b id="start-date" style="font-family:'Heebo';">03.2026</b>
        </div>
    </div>

    <!-- אזור הגרפים -->
    <div class="data-area">
        
        <!-- גרף ביצועים -->
        <div class="box-panel chart-box">
            <div class="box-header">
                <span><i class="fa-solid fa-chart-line"></i> PORTFOLIO INDEX</span>
            </div>
            <div class="svg-container">
                <svg class="chart-svg" viewBox="0 0 800 200" preserveAspectRatio="none">
                    <defs>
                        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#c5a059"/><stop offset="100%" stop-color="#f1d392"/>
                        </linearGradient>
                        <linearGradient id="areaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" stop-color="#f1d392" stop-opacity="0.3"/>
                            <stop offset="100%" stop-color="#c5a059" stop-opacity="0"/>
                        </linearGradient>
                    </defs>
                    <path id="dynamic-chart-area" class="chart-area" d="M0,180 Q200,180 400,120 T800,20 L800,200 L0,200 Z" />
                    <path id="dynamic-chart-path" class="chart-path" d="M0,180 Q200,180 400,120 T800,20" />
                </svg>
            </div>
        </div>
        
        <!-- דונאט פילוח נכסים -->
        <div class="box-panel allocation-box">
            <div class="box-header" style="width: 100%; justify-content: center; margin-bottom: 10px;">
                <span>פילוח נכסים מוסדי</span>
            </div>
            
            <div class="donut-wrap">
                <svg viewBox="0 0 42 42" class="donut-svg">
                    <circle class="donut-bg" cx="21" cy="21" r="15.915"></circle>
                    <!-- ערכים לדוגמה שיושבים בול על 100% -->
                    <circle cx="21" cy="21" r="15.915" stroke="var(--color-tech)" stroke-dasharray="40 60" stroke-dashoffset="0"></circle>
                    <circle cx="21" cy="21" r="15.915" stroke="var(--color-def)" stroke-dasharray="10 90" stroke-dashoffset="-40"></circle>
                    <circle cx="21" cy="21" r="15.915" stroke="var(--color-liq)" stroke-dasharray="50 50" stroke-dashoffset="-50"></circle>
                </svg>
                <div class="donut-center">
                    <b>100%</b>
                    <span>סה"כ הוקצה</span>
                </div>
            </div>
            
            <div class="alloc-legend">
                <div class="legend-item"><div><span class="legend-dot" style="background:var(--color-tech);"></span> טכנולוגיה</div><span style="font-family:Montserrat;">40%</span></div>
                <div class="legend-item"><div><span class="legend-dot" style="background:var(--color-def);"></span> ביטחוניות</div><span style="font-family:Montserrat;">10%</span></div>
                <div class="legend-item"><div><span class="legend-dot" style="background:var(--color-liq);"></span> נזילות</div><span style="font-family:Montserrat;">50%</span></div>
            </div>
        </div>

    </div>
</div>

<!-- סרגל מניות חי -->
<div class="ticker-wrap"><div class="ticker-move" id="ticker-data"></div></div>

<script>
    // הגדרת שעון וטיקר חי
    setInterval(() => { 
        document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'}) + " | " + new Date().toLocaleDateString('he-IL'); 
    }, 1000);

    let markets = [{ n: 'ת"א 125', v: 2080.48, c: -0.54 }, { n: 'בנקים', v: 3875.87, c: 0.59 }, { n: 'Next Vision', v: 8818.38, c: 0.86 }, { n: 'אירודרום', v: 878.55, c: 1.24 }, { n: 'SMX', v: 139.70, c: 0.59 }];
    
    function renderTicker() {
        const c = markets.map(s => `<div class="ticker-item"><span style="color:var(--gold-bright);">${s.n}</span> <span>${s.v.toFixed(2)}</span> <span style="color:${s.c>0?'var(--success)':'var(--danger)'}">${s.c>0?'▲':'▼'} ${Math.abs(s.c).toFixed(2)}%</span></div>`).join('');
        document.getElementById('ticker-data').innerHTML = c + c;
    }
    renderTicker();

    // ציור אקטיבי של רקע הקנבס
    const canvas = document.getElementById('algo-bg'), ctx = canvas.getContext('2d'); 
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();
    ctx.fillStyle = 'rgba(197,160,89,0.1)'; 
    function anim() { ctx.clearRect(0,0,canvas.width,canvas.height); requestAnimationFrame(anim); } anim(); 
</script>

</body>
</html>
