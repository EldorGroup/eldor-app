<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ELDOR GROUP | Official Portfolio</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@200;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>
    
    <style>
        :root { 
            --gold: #c5a059; 
            --bg: #000000;
            --card: #0a0a0a;
            --border: #1a1a1a;
            --glass: rgba(10, 10, 10, 0.96);
        }

        /* מניעת פריצת רזולוציה ובאגים בנייד */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        ::-webkit-scrollbar { display: none; }
        
        body, html { 
            background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; 
            height: 100dvh; width: 100vw; overflow: hidden; position: fixed;
        }

        #particles-js { position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.3; }

        header {
            position: fixed; top: 0; width: 100%; height: 80px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 5000; padding: 0 5%; background: linear-gradient(to bottom, #000 40%, transparent);
        }
        .logo { font-family: 'Cinzel', serif; font-size: clamp(18px, 4vw, 24px); letter-spacing: 6px; color: #fff; text-decoration: none; }
        .logo span { color: var(--gold); font-weight: 700; }

        .btn-gold {
            background: var(--gold); color: #000; border: none; padding: 12px 24px;
            font-size: 11px; font-weight: 900; letter-spacing: 2px; cursor: pointer;
            transition: 0.3s; 
        }

        /* מניות רצות - TICKER */
        .ticker-wrap {
            position: fixed; bottom: 0; width: 100%; height: 45px;
            background: #050505; border-top: 1px solid var(--border);
            z-index: 9000; display: flex; align-items: center; overflow: hidden;
        }
        .ticker-move { display: flex; white-space: nowrap; animation: ticker-anim 35s linear infinite; }
        .ticker-item { padding: 0 30px; font-size: 12px; font-weight: 700; display: flex; gap: 8px; }
        .ticker-item b { color: var(--gold); }
        .ticker-item .up { color: #00ffaa; }
        .ticker-item .down { color: #ff4444; }
        @keyframes ticker-anim { 0% { transform: translate3d(0,0,0); } 100% { transform: translate3d(100%,0,0); } }

        /* ניווט צד / תחתון */
        nav.sidebar {
            position: fixed; right: 0; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 12px; z-index: 6000;
        }
        .nav-link {
            background: var(--glass); border: 1px solid var(--border);
            height: 60px; width: 60px; border-radius: 40px 0 0 40px;
            display: flex; align-items: center; padding-right: 22px;
            cursor: pointer; transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1); backdrop-filter: blur(15px);
        }
        .nav-link i { color: var(--gold); font-size: 1.3rem; min-width: 30px; }
        .nav-link span { opacity: 0; margin-right: 20px; white-space: nowrap; font-size: 15px; letter-spacing: 1px; }
        .nav-link:hover { width: 220px; border-color: var(--gold); }
        .nav-link:hover span { opacity: 1; }

        /* ניהול דפים */
        .page-content { 
            position: absolute; inset: 0; padding: 100px 6% 120px; 
            overflow-y: auto; display: none; z-index: 100; 
        }
        .page-content.active { display: block; animation: pageIn 0.5s ease; }
        @keyframes pageIn { from { opacity: 0; } to { opacity: 1; } }

        /* אזור אישי - LOGIN */
        .login-card { 
            max-width: 400px; margin: 40px auto; background: var(--glass);
            padding: 50px 30px; border: 1px solid var(--border); border-top: 5px solid var(--gold);
            text-align: center; backdrop-filter: blur(20px);
        }
        .login-card input { 
            width: 100%; padding: 18px; background: rgba(255,255,255,0.03); 
            border: 1px solid #222; color: #fff; margin-bottom: 25px; 
            font-size: 18px; text-align: center; border-radius: 4px;
        }

        /* דשבורד - תיקון רזולוציה סופי */
        .dash-grid { 
            max-width: 1300px; margin: 0 auto; 
            display: grid; grid-template-columns: 1fr 320px; gap: 25px; 
        }
        .panel-lux { 
            background: var(--card); border: 1px solid var(--border); padding: clamp(20px, 4vw, 40px); 
            position: relative; overflow: visible; 
        }
        .panel-lux::before { content: ''; position: absolute; left: 0; top: 0; width: 4px; height: 100%; background: var(--gold); }

        .stat-wrap { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
            gap: 20px; margin-bottom: 40px; 
        }
        .stat-box { 
            background: #000; border: 1px solid #111; padding: 30px 15px; 
            text-align: center; min-height: 150px; display: flex; flex-direction: column; justify-content: center;
            overflow-wrap: break-word;
        }
        .stat-box label { font-size: 10px; color: var(--gold); letter-spacing: 3px; font-weight: 800; margin-bottom: 12px; }
        .stat-box .val { font-size: clamp(22px, 3.5vw, 32px); font-weight: 200; color: #fff; }

        /* רזולוציה לניידים */
        @media (max-width: 1000px) {
            .dash-grid { grid-template-columns: 1fr; }
            nav.sidebar { 
                top: auto; bottom: 0; right: 0; left: 0; transform: none; 
                flex-direction: row; width: 100%; height: 75px; background: #000; 
                border-top: 1px solid var(--gold);
            }
            .nav-link { border-radius: 0; border: none; width: 25%; flex-direction: column; justify-content: center; padding: 0; }
            .nav-link span { opacity: 1; font-size: 10px; margin-top: 6px; }
            .nav-link:hover { width: 25%; }
            .ticker-wrap { bottom: 75px; }
            .page-content { padding-bottom: 160px; padding-top: 90px; }
        }
    </style>
</head>
<body>

<div id="particles-js"></div>

<header>
    <a href="#" class="logo" onclick="goTo('home')">ELDOR <span>GROUP</span></a>
    <button class="btn-gold" onclick="goTo('vault')">כניסת לקוח</button>
</header>

<nav class="sidebar">
    <div class="nav-link" onclick="goTo('about')"><i class="fa-solid fa-landmark"></i><span>חזון</span></div>
    <div class="nav-link" onclick="goTo('routes')"><i class="fa-solid fa-chart-line"></i><span>מסלולים</span></div>
    <div class="nav-link" onclick="goTo('faq')"><i class="fa-solid fa-shield-halved"></i><span>ביטחונות</span></div>
    <div class="nav-link" onclick="goTo('contact')"><i class="fa-solid fa-phone"></i><span>קשר</span></div>
</nav>

<div class="ticker-wrap">
    <div class="ticker-move" id="ticker-target"></div>
</div>

<div id="home-page" class="page-content active" style="display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;">
    <h1 style="font-family:'Cinzel'; font-size: clamp(40px, 15vw, 130px); letter-spacing: 20px; font-weight: 100;">ELDOR</h1>
    <div style="width: 60px; height: 1px; background: var(--gold); margin: 30px 0;"></div>
    <p style="color: var(--gold); letter-spacing: 12px; font-size: clamp(10px, 2vw, 14px); font-weight: 300;">PRIVATE CAPITAL MANAGEMENT</p>
</div>

<div id="vault-page" class="page-content">
    <div id="login-ui" class="login-card">
        <h2 style="font-family:'Cinzel'; margin-bottom: 30px; letter-spacing: 4px;">SECURE ACCESS</h2>
        <input type="tel" id="p_tel" placeholder="מספר טלפון">
        <input type="password" id="p_pass" placeholder="קוד גישה">
        <button class="btn-gold" style="width: 100%; padding: 20px;" onclick="validate()">LOGIN</button>
    </div>

    <div id="dash-ui" class="dash-grid" style="display: none;">
        <div class="panel-lux">
            <h2 style="font-family:'Cinzel'; font-weight: 100; margin-bottom: 40px; letter-spacing: 3px;">PORTFOLIO <span style="color:var(--gold)">STATUS</span></h2>
            <div class="stat-wrap">
                <div class="stat-box"><label>שווי תיק נוכחי</label><div class="val">₪1,450,230</div></div>
                <div class="stat-box"><label>תשואה שנתית</label><div class="val" style="color:#00ffaa;">+12.42%</div></div>
                <div class="stat-box"><label>רווח פתוח</label><div class="val">₪136,580</div></div>
            </div>
            <div style="height:220px; border-bottom: 2px solid var(--gold); background: linear-gradient(transparent, rgba(197,160,89,0.02));">
                <svg viewBox="0 0 1000 220" preserveAspectRatio="none" style="width:100%; height:100%;">
                    <path d="M0,200 Q150,170 300,180 T600,100 T1000,40" fill="none" stroke="var(--gold)" stroke-width="4" />
                </svg>
            </div>
        </div>
        <div style="display: flex; flex-direction: column; gap: 20px;">
            <div class="panel-lux" style="padding: 25px;">
                <h4 style="color:var(--gold); font-size: 11px; letter-spacing: 2px; margin-bottom: 15px;">MESSAGES</h4>
                <p style="font-size: 13px; color: #555;">• הדוח הרבעוני זמין להורדה</p>
            </div>
            <button class="btn-gold" style="background:#200; color:#fff;" onclick="logout()">יציאה מאובטחת</button>
        </div>
    </div>
</div>

<div id="about-page" class="page-content"><h1 style="text-align:center; font-family:'Cinzel'; color:var(--gold);">OUR VISION</h1></div>
<div id="routes-page" class="page-content"><h1 style="text-align:center; font-family:'Cinzel'; color:var(--gold);">STRATEGIES</h1></div>
<div id="faq-page" class="page-content"><h1 style="text-align:center; font-family:'Cinzel'; color:var(--gold);">SECURITY</h1></div>
<div id="contact-page" class="page-content"><h1 style="text-align:center; font-family:'Cinzel'; color:var(--gold);">CONTACT</h1></div>

<script>
    function goTo(id) {
        document.querySelectorAll('.page-content').forEach(p => { p.classList.remove('active'); p.style.display='none'; });
        const target = document.getElementById(id + '-page');
        if(target) {
            target.style.display = (id === 'home') ? 'flex' : 'block';
            setTimeout(() => target.classList.add('active'), 50);
        }
        localStorage.setItem('eldor_v_last', id);
    }

    function validate() {
        const ph = document.getElementById('p_tel').value;
        const ps = document.getElementById('p_pass').value;
        if(ph.length >= 9 && ps.length >= 4) {
            localStorage.setItem('eldor_auth', 'active');
            showDashboard();
        } else {
            alert('פרטי זיהוי לא תקינים');
        }
    }

    function showDashboard() {
        document.getElementById('login-ui').style.display = 'none';
        const dash = document.getElementById('dash-ui');
        dash.style.display = (window.innerWidth > 1000) ? 'grid' : 'flex';
        dash.style.flexDirection = 'column';
    }

    function logout() { localStorage.clear(); location.reload(); }

    const stocks = [
        {n: "ת\"א 35", v: "2,145", c: "+0.45%"},
        {n: "מדד הבנקים", v: "3,890", c: "-0.22%"},
        {n: "SOXS", v: "32.14", c: "-4.20%"},
        {n: "GOLD", v: "2,150", c: "+0.88%"},
        {n: "S&P 500", v: "5,123", c: "+0.15%"},
        {n: "ELDOR STRATEGY", v: "142.0", c: "+1.12%"}
    ];

    function initTicker() {
        const track = document.getElementById('ticker-target');
        const content = stocks.map(s => `
            <div class="ticker-item">
                <b>${s.n}</b> ${s.v} <span class="${s.c.includes('-') ? 'down' : 'up'}">${s.c}</span>
            </div>
        `).join('');
        track.innerHTML = content + content;
    }

    window.onload = function() {
        initTicker();
        if(localStorage.getItem('eldor_auth') === 'active') showDashboard();
        goTo(localStorage.getItem('eldor_v_last') || 'home');

        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 60 },
                "color": { "value": "#c5a059" },
                "opacity": { "value": 0.3 },
                "size": { "value": 1.5 },
                "line_linked": { "enable": true, "distance": 150, "color": "#c5a059", "opacity": 0.1 },
                "move": { "enable": true, "speed": 1 }
            }
        });
    };
</script>
</body>
</html>
